<script>
    // Estado global del Wizard de Importación
    window.wizardStateIA = window.wizardStateIA || {
        step: 1, // Paso actual desbloqueado
        completed: [] // Pasos 1, 2, 3, 4 completados
    };

    /**
     * Muestra u oculta el spinner global de carga.
     * Cuando se muestra bloquea automáticamente gracias a sus estilos pointer-events.
     * @param {boolean} mostrar - true para mostrar, false para ocultar.
     */
    function toggleSpinner(mostrar) {
        const spinner = document.getElementById('global-spinner');
        if (mostrar) {
            spinner.classList.remove('hidden');
        } else {
            spinner.classList.add('hidden');
        }
    }

    /**
     * Notificación simple de éxito.
     */
    function notificarExito(mensaje) {
        console.log("ÉXITO:", mensaje);
    }

    // Sidebar Logic
    window.toggleSidebar = function () {
        const sidebar = document.getElementById('sidebar');
        const icon = document.getElementById('toggle-icon');
        sidebar.classList.toggle('collapsed');

        const isCollapsed = sidebar.classList.contains('collapsed');
        localStorage.setItem('sidebarCollapsed', isCollapsed);

        // Rotate icon
        if (isCollapsed) {
            icon.classList.add('rotate-180');
        } else {
            icon.classList.remove('rotate-180');
        }
    };

    window.setActiveLink = function (el) {
        document.querySelectorAll('.nav-link').forEach(link => {
            link.classList.remove('active', 'bg-white/5');
            link.querySelector('.sidebar-text').classList.replace('text-white', 'text-slate-300');
            link.querySelector('div').classList.replace('text-blue-500', 'text-slate-400');
        });

        el.classList.add('active', 'bg-white/5');
        el.querySelector('.sidebar-text').classList.replace('text-slate-300', 'text-white');
        el.querySelector('div').classList.replace('text-slate-400', 'text-blue-500');
    };

    // Initialize sidebar state
    document.addEventListener('DOMContentLoaded', () => {
        const isCollapsed = localStorage.getItem('sidebarCollapsed') === 'true';
        if (isCollapsed) {
            document.getElementById('sidebar').classList.add('collapsed');
            document.getElementById('toggle-icon').classList.add('rotate-180');
        }
    });

    // Utilidades Globales
    const formatoMoneda = (v) => new Intl.NumberFormat('es-MX', { style: 'currency', currency: 'MXN', maximumFractionDigits: 2 }).format(v || 0);
    const formatoPct = (v) => (v * 100).toFixed(2) + '%';
    const formatoPct4 = (v) => (v * 100).toFixed(4) + '%';

    /**
     * Convierte un número a su representación en letras (Moneda Mexicana).
     * @param {number} cantidad - El monto numérico.
     * @returns {string} - El monto en letras.
     */
    function convertirNumeroALetras(cantidad) {
        const unidades = ["", "UN", "DOS", "TRES", "CUATRO", "CINCO", "SEIS", "SIETE", "OCHO", "NUEVE"];
        const decenas = ["DIEZ", "ONCE", "DOCE", "TRECE", "CATORCE", "QUINCE", "DIECISEIS", "DIECISIETE", "DIECIOCHO", "DIECINUEVE"];
        const decenasMod = ["", "", "VEINTE", "TREINTA", "CUARENTA", "CINCUENTA", "SESENTA", "SETENTA", "OCHENTA", "NOVENTA"];
        const centenas = ["", "CIENTO", "DOSCIENTOS", "TRESCIENTOS", "CUATROCIENTOS", "QUINCIENTOS", "SEISCIENTOS", "SETECIENTOS", "OCHOCIENTOS", "NOVECIENTOS"];

        const seccion = (num, divisor, strSingular, strPlural) => {
            let c = Math.floor(num / divisor);
            let resto = num % divisor;
            let s = "";
            if (c > 0) {
                if (c > 1) s = decimas(c) + " " + strPlural;
                else s = strSingular;
            }
            if (resto > 0) {
                if (s !== "") s += " ";
                s += decimas(resto);
            }
            return s;
        };

        const decimas = (n) => {
            if (n === 100) return "CIEN";
            if (n < 10) return unidades[n];
            if (n < 20) return decenas[n - 10];
            let d = Math.floor(n / 10);
            let u = n % 10;
            if (u > 0) return decenasMod[d] + " Y " + unidades[u];
            return decenasMod[d];
        };

        const centes = (n) => {
            if (n === 100) return "CIEN";
            let c = Math.floor(n / 100);
            let resto = n % 100;
            if (resto > 0) return centenas[c] + " " + decimas(resto);
            return centenas[c];
        };

        const miles = (n) => {
            let m = Math.floor(n / 1000);
            let resto = n % 1000;
            let s = "";
            if (m === 1) s = "MIL";
            else if (m > 1) s = centes(m) + " MIL";
            if (resto > 0) {
                if (s !== "") s += " ";
                s += centes(resto);
            }
            return s;
        };

        const millones = (n) => {
            let mill = Math.floor(n / 1000000);
            let resto = n % 1000000;
            let s = "";
            if (mill === 1) s = "UN MILLÓN";
            else if (mill > 1) s = centes(mill) + " MILLONES";
            if (resto > 0) {
                if (s !== "") s += " ";
                s += miles(resto);
            }
            return s;
        };

        let entero = Math.floor(cantidad);
        let centavos = Math.round((cantidad - entero) * 100);
        let letras = "";

        if (entero === 0) letras = "CERO";
        else if (entero < 1000) letras = centes(entero);
        else if (entero < 1000000) letras = miles(entero);
        else letras = millones(entero);

        let centavosStr = centavos.toString().padStart(2, '0') + "/100 M.N.";
        return letras + " PESOS " + centavosStr;
    }

    const MESES_ESP = {
        '01': 'ENE', '02': 'FEB', '03': 'MAR', '04': 'ABR', '05': 'MAY', '06': 'JUN',
        '07': 'JUL', '08': 'AGO', '09': 'SEP', '10': 'OCT', '11': 'NOV', '12': 'DIC'
    };

    /**
     * Carga una vista desde el servidor usando Lazy Loading e inyecta el HTML en #app-shell.
     * @param {string} nombreVista - Nombre del archivo de vista (ej: 'contratos.vw').
     * @param {object} params - Parámetros opcionales a pasar a la vista (ej: { id: 1 }).
     */
    function cargarVista(nombreVista, params = null) {
        toggleSpinner(true); // 1. Mostrar el Spinner (bloqueando UI)

        // Guardar params temporalmente para la vista
        window.vistaActualParams = params;

        // 2. Ejecutar google.script.run para traer el HTML
        google.script.run
            .withSuccessHandler(function (respuesta) {
                // 4. Ocultar el Spinner
                toggleSpinner(false);

                if (respuesta.success) {
                    // 3. Inyectar el HTML en #app-shell
                    document.getElementById('app-shell').innerHTML = respuesta.data;

                    // Despachar un evento por si alguna vista requiere inicializar un script externo u otra lógica
                    const event = new CustomEvent('vistaCargada', { detail: { vista: nombreVista, params: params } });
                    document.dispatchEvent(event);
                } else {
                    manejarError(respuesta);
                }
            })
            .withFailureHandler(function (error) {
                toggleSpinner(false);
                manejarError({
                    success: false,
                    error: error.message,
                    functionName: 'google.script.run / cargarVista'
                });
            })
            .getView(nombreVista);
    }

    /**
     * Manejador centralizado de errores para el frontend.
     * @param {object} respuestaError - Objeto de error estructurado del servidor.
     */
    function manejarError(respuestaError) {
        const fnName = respuestaError.functionName || 'Desconocida';
        const detail = respuestaError.error;

        // Imprimir el error en consola de manera estandarizada
        console.error(`Error en función: [${fnName}] | Detalle: `, detail);

        // Notificación en UI opcional (por alerta estándar para empezar)
        alert(`Ocurrió un error en la aplicación.\n\nFunción: ${fnName}\nError: ${detail}`);
    }

    // --- Controladores de Vistas --- //

    // Listener global para inicializar lógica específica cuando una vista termina de cargar
    document.addEventListener('vistaCargada', function (e) {
        if (e.detail.vista === 'contratos.vw') {
            inicializarContratos();
        } else if (e.detail.vista === 'contrato_detalle.vw') {
            inicializarContratoDetalle(e.detail.params);
        } else if (e.detail.vista === 'dashboard.vw') {
            inicializarDashboard();
        }
    });

    /**
     * Maneja el cambio de pestañas en la vista de detalle.
     * @param {string} tabId - ID del contenedor de la pestaña a mostrar.
     */
    function switchTab(tabId) {
        // 1. Ocultar todos los contenidos de pestañas
        document.querySelectorAll('.tab-content').forEach(el => {
            el.classList.add('hidden');
            el.classList.remove('block');
        });

        // 2. Mostrar la pestaña seleccionada
        const target = document.getElementById(tabId);
        if (target) {
            target.classList.remove('hidden');
            target.classList.add('block');

            // Si entramos al programa, refrescar con el orden actual de conceptos
            if (tabId === 'tab-programa' && window.programaActual) {
                renderizarProgramaMatricial(window.programaActual);
            }

            // Si entramos a estimaciones, cargar listado
            if (tabId === 'tab-estimaciones') {
                cargarEstimacionesContrato();
            }
        }

        // 3. Actualizar estilos de los botones
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.classList.remove('border-inst-vino', 'text-inst-vino', 'bg-inst-crema/30');
            btn.classList.add('border-transparent', 'text-slate-400');
        });

        const activeBtn = document.getElementById(`btn-${tabId}`);
        if (activeBtn) {
            activeBtn.classList.remove('border-transparent', 'text-slate-400');
            activeBtn.classList.add('border-inst-vino', 'text-inst-vino', 'bg-inst-crema/30');
        }
    }

    // --- Controladores: Dashboard --- //

    function inicializarDashboard() {
        google.script.run
            .withSuccessHandler(function (respuesta) {
                if (respuesta && respuesta.success) {
                    renderizarDashboard(respuesta.data);
                } else {
                    const errorMsg = respuesta ? respuesta.error : "El servidor devolvió una respuesta nula (Timeout o error interno).";
                    manejarError({
                        success: false,
                        error: errorMsg,
                        functionName: 'getDashboardData'
                    });
                }
            })
            .withFailureHandler(function (error) {
                manejarError({
                    success: false,
                    error: error.message,
                    functionName: 'google.script.run / getDashboardData'
                });
            })
            .getDashboardData();
    }

    function renderizarDashboard(data) {
        if (!data) return;

        const formatoMoneda = (v) => new Intl.NumberFormat('es-MX', { style: 'currency', currency: 'MXN' }).format(v || 0);
        const kpis = data.kpis || {};

        // 1. Renderizar KPIs Financieros
        const total = kpis.totalContratado || 0;
        const pagado = kpis.totalPagado || 0;
        const finiquitado = kpis.totalFiniquitado || 0;
        const porEjercer = kpis.porEjercer || 0;
        const pctPagado = total > 0 ? (pagado / total) * 100 : 0;

        document.getElementById('kpi-total-contratado').textContent = formatoMoneda(total);
        document.getElementById('kpi-total-pagado').textContent = formatoMoneda(pagado);
        document.getElementById('kpi-total-finiquitado').textContent = formatoMoneda(finiquitado);
        document.getElementById('kpi-por-ejercer').textContent = formatoMoneda(porEjercer);

        const barProgreso = document.getElementById('bar-progreso-financiero');
        if (barProgreso) barProgreso.style.width = pctPagado.toFixed(2) + '%';
        const lblPct = document.getElementById('lbl-porcentaje-pagado');
        if (lblPct) lblPct.textContent = pctPagado.toFixed(2) + '% del presupuesto';

        // 2. Renderizar Proyecciones Mensuales (Mini Chart CSS)
        const containerProy = document.getElementById('chart-proyecciones-pagos');
        if (containerProy && data.proyeccionesMensuales) {
            const meses = Object.keys(data.proyeccionesMensuales).sort();
            if (meses.length > 0) {
                const maxMonto = Math.max(...Object.values(data.proyeccionesMensuales));
                containerProy.innerHTML = meses.map(mes => {
                    const monto = data.proyeccionesMensuales[mes];
                    const altura = maxMonto > 0 ? (monto / maxMonto * 100) : 0;
                    const labelMes = mes.split('-')[1]; // Solo el mes
                    return `
                        <div class="flex flex-col items-center group/bar relative h-full justify-end">
                            <div class="absolute -top-10 bg-slate-800 text-white text-[9px] px-2 py-1 rounded opacity-0 group-hover/bar:opacity-100 transition-opacity whitespace-nowrap z-10 shadow-xl">
                                ${formatoMoneda(monto)}
                            </div>
                            <div class="w-full bg-inst-vino/10 rounded-t-lg group-hover/bar:bg-inst-vino/30 transition-all cursor-help relative" style="height: ${altura}%">
                                <div class="absolute bottom-0 left-0 w-full bg-inst-vino rounded-t-lg" style="height: ${Math.min(altura, 20)}%"></div>
                            </div>
                            <span class="text-[8px] font-black text-slate-400 mt-2 uppercase">${MESES_ESP[labelMes] || labelMes}</span>
                        </div>
                    `;
                }).join('');
            } else {
                containerProy.innerHTML = `<div class="col-span-full text-center text-slate-300 italic text-xs py-10">Sin datos de programa cargados.</div>`;
            }
        }

        // 3. Renderizar Corte de Ejercicios
        const containerEjer = document.getElementById('list-corte-ejercicios');
        if (containerEjer && data.corteEjercicios) {
            const años = Object.keys(data.corteEjercicios).sort((a, b) => b - a);
            let totalProg = 0;
            if (años.length > 0) {
                containerEjer.innerHTML = años.map(año => {
                    const monto = data.corteEjercicios[año];
                    totalProg += monto;
                    return `
                        <div class="flex items-center justify-between p-4 bg-slate-50 border border-slate-100 rounded-2xl hover:border-inst-oro/30 transition-all group/item">
                            <div class="flex items-center space-x-3">
                                <div class="w-8 h-8 bg-white border border-slate-200 rounded-lg flex items-center justify-center text-[10px] font-black text-slate-500 group-hover/item:border-inst-oro group-hover/item:text-inst-vino transition-colors">
                                    ${año}
                                </div>
                                <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Ejercicio Fiscal</span>
                            </div>
                            <span class="text-xs font-black text-slate-700 italic">${formatoMoneda(monto)}</span>
                        </div>
                    `;
                }).join('');
                document.getElementById('lbl-total-programado-global').textContent = formatoMoneda(totalProg);
            } else {
                containerEjer.innerHTML = `<div class="text-center text-slate-300 italic text-xs py-10">Sin periodos programados.</div>`;
            }
        }

        // 4. Renderizar Tabla de Contratos Recientes
        const tbody = document.getElementById('dashboard-contratos-body');
        if (tbody) {
            if (!data.contratosRecientes || data.contratosRecientes.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="py-16 text-center text-sm font-bold text-slate-400 italic">No hay registros vigentes en la base de datos.</td></tr>`;
                return;
            }

            tbody.innerHTML = data.contratosRecientes.map(c => {
                const estado = c.Estado || 'N/A';
                let style = 'bg-slate-100 text-slate-500 border-slate-200';
                if (['activo', 'vigente'].includes(estado.toLowerCase())) style = 'bg-emerald-50 text-emerald-600 border-emerald-100';
                else if (['finalizado', 'terminado'].includes(estado.toLowerCase())) style = 'bg-blue-50 text-blue-600 border-blue-100';

                return `
                    <tr class="group hover:bg-slate-50 transition-all cursor-pointer" onclick="cargarVista('contrato_detalle.vw', { id: '${c.ID_Contrato}' })">
                        <td class="px-6 py-5">
                            <div class="flex flex-col">
                                <span class="text-xs font-black text-inst-vino uppercase tracking-tight italic group-hover:translate-x-1 transition-transform">${c.Numero_Contrato}</span>
                                <span class="text-[9px] font-bold text-slate-400 uppercase mt-0.5">Identificador de Obra</span>
                            </div>
                        </td>
                        <td class="px-6 py-5">
                            <div class="inline-flex items-center px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest border ${style}">
                                <span class="h-1.5 w-1.5 rounded-full mr-2 current-bg"></span>
                                ${estado}
                            </div>
                        </td>
                        <td class="px-6 py-5 text-right font-black text-slate-700 italic tracking-tighter text-sm">
                            ${formatoMoneda(c.Monto_Total_Con_IVA)}
                        </td>
                        <td class="px-6 py-5 text-center">
                            <button class="inline-flex items-center justify-center w-8 h-8 rounded-full bg-slate-50 text-slate-400 group-hover:bg-inst-vino group-hover:text-white transition-all shadow-sm">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M9 5l7 7-7 7"></path></svg>
                            </button>
                        </td>
                    </tr>
                `;
            }).join('');
        }
    }

    // --- Controladores: Listado de Contratos --- //

    function inicializarContratos() {
        toggleSpinner(true);

        // Llamar al backend para obtener los datos usando google.script.run
        google.script.run
            .withSuccessHandler(function (respuesta) {
                toggleSpinner(false);
                if (respuesta.success) {
                    renderizarContratos(respuesta.data);
                } else {
                    manejarError(respuesta);
                }
            })
            .withFailureHandler(function (error) {
                toggleSpinner(false);
                manejarError({
                    success: false,
                    error: error.message,
                    functionName: 'google.script.run / getContratosData'
                });
            })
            .getContratosData();
    }

    function renderizarContratos(data) {
        const tbody = document.getElementById('contratos-body');

        if (!data || data.length === 0) {
            tbody.innerHTML = `<tr><td colspan="4" class="px-6 py-8 border-b border-gray-100 bg-white text-sm text-center text-gray-500">No hay contratos registrados.</td></tr>`;
            return;
        }

        let htmlRows = '';
        data.forEach(contrato => {
            // Conversión e internacionalización monetaria (MXN)
            let montoValor = contrato.Monto_Total_Con_IVA || 0;
            let formatoMonto = new Intl.NumberFormat('es-MX', { style: 'currency', currency: 'MXN' }).format(montoValor);

            // Estilización de color según el estado
            let colorEstado = 'bg-gray-100 text-gray-800';
            let estadoLabel = contrato.Estado ? contrato.Estado : 'N/A';

            if (estadoLabel.toLowerCase() === 'activo') colorEstado = 'bg-emerald-100 text-emerald-800 border border-emerald-200';
            else if (estadoLabel.toLowerCase() === 'finalizado') colorEstado = 'bg-blue-100 text-blue-800 border border-blue-200';
            else if (estadoLabel.toLowerCase() === 'rescindido') colorEstado = 'bg-rose-100 text-rose-800 border border-rose-200';
            else if (estadoLabel.toLowerCase() === 'suspendido') colorEstado = 'bg-amber-100 text-amber-800 border border-amber-200';


            htmlRows += `
      <tr class="hover:bg-inst-crema/10 transition-all duration-200 cursor-pointer group" onclick="cargarVista('contrato_detalle.vw', { id: '${contrato.ID_Contrato}' })">
        <td class="px-8 py-2 border-b border-slate-50 bg-white">
            <p class="text-inst-vino font-black italic uppercase tracking-tight group-hover:translate-x-1 transition-transform duration-300">
                ${contrato.Numero_Contrato || '-'}
            </p>
        </td>
        <td class="px-8 py-2 border-b border-slate-50 bg-white">
          <p class="text-slate-600 font-bold truncate max-w-sm" title="${contrato.Objeto_Contrato || ''}">
            ${contrato.Objeto_Contrato || '-'}
          </p>
        </td>
        <td class="px-8 py-2 border-b border-slate-50 bg-white text-right">
            <p class="text-slate-900 font-black tracking-tighter">${formatoMonto}</p>
        </td>
        <td class="px-8 py-2 border-b border-slate-50 bg-white text-center">
            <span class="inline-flex items-center px-1 py-1 rounded-full text-sm font-black uppercase tracking-wider shadow-sm ${colorEstado}">
                <span class="w-1.5 h-1.5 rounded-full mr-2 opacity-75 ${colorEstado.split(' ')[0].replace('bg-', 'bg-')}"></span>
                ${estadoLabel}
            </span>
        </td>
      </tr>
    `;
        });

        tbody.innerHTML = htmlRows;
    }

    // --- Controladores: Detalle de un Contrato --- //

    function inicializarContratoDetalle(params) {
        if (!params || !params.id) {
            manejarError({ error: 'ID de contrato no proporcionado para la vista de detalle.', functionName: 'inicializarContratoDetalle' });
            return;
        }

        // --- ASIGNACIÓN DE ID GLOBAL ---
        window.idContratoActual = params.id;

        toggleSpinner(true);
        // Despachar el detalle básico del contrato
        google.script.run
            .withSuccessHandler(function (respuesta) {
                if (respuesta.success) {
                    renderizarContratoDetalle(respuesta.data);

                    // Cargar el Catálogo de Conceptos de forma asíncrona
                    google.script.run
                        .withSuccessHandler(function (respC) {
                            if (respC.success) {
                                window.conceptosActuales = respC.data;
                                renderizarConceptos(respC.data);
                            }
                        })
                        .getConceptosContrato(params.id);

                    // Cargar el Programa de Ejecución Matricial de forma asíncrona
                    google.script.run
                        .withSuccessHandler(function (respP) {
                            toggleSpinner(false);
                            if (respP.success) {
                                window.programaActual = respP.data;
                                renderizarProgramaMatricial(respP.data);
                            } else {
                                manejarError(respP);
                            }
                        })
                        .withFailureHandler(function (err) {
                            toggleSpinner(false);
                            manejarError({ success: false, error: err.message, functionName: 'getProgramaEjecucion' });
                        })
                        .getProgramaEjecucion(params.id);

                    // --- NUEVO: Cargar Resumen Financiero Contractual ---
                    google.script.run
                        .withSuccessHandler(function (respR) {
                            if (respR.success) {
                                renderizarResumenFinanciero(respR.data);
                            }
                        })
                        .getResumenFinancieroContrato(params.id);

                } else {
                    toggleSpinner(false);
                    manejarError(respuesta);
                }
            })
            .withFailureHandler(function (error) {
                toggleSpinner(false);
                manejarError({
                    success: false,
                    error: error.message,
                    functionName: 'google.script.run / getDetalleContrato'
                });
            })
            .getDetalleContrato(params.id);
    }

    function renderizarProgramaMatricial(data) {
        const thead = document.getElementById('tabla-programa-head');
        // 0. Guardar IDs globales del programa
        window.programaActualId = data.idPrograma;
        const tbody = document.getElementById('tabla-programa-body');
        if (!thead || !tbody) return;

        if (!data || !data.meses || data.meses.length === 0) {
            tbody.innerHTML = `<tr><td class="px-2 py-8 text-center text-gray-500 italic">No hay programa registrado.</td></tr>`;
            return;
        }

        const formatoMoneda = (v) => new Intl.NumberFormat('es-MX', { style: 'currency', currency: 'MXN', maximumFractionDigits: 2 }).format(v || 0);
        const formatoPct = (v) => (v * 100).toFixed(2) + '%';

        // 1. Mostrar Chips de Periodos Premium
        const chipsContainer = document.getElementById('lista-periodos-container');
        const chipsList = document.getElementById('lista-periodos-chips');
        if (chipsContainer && chipsList) {
            chipsContainer.classList.remove('hidden');

    function renderizarContratoDetalle(data) {
        if (!data) return;

        // Formateadores locales
        const formatoMoneda = (valor) => {
            let valNum = parseFloat(valor);
            return isNaN(valNum) ? '$0.00' : new Intl.NumberFormat('es-MX', { style: 'currency', currency: 'MXN' }).format(valNum);
        };
        const formatoFecha = (valorStr) => {
            if (!valorStr) return '--/--/----';
            try {
                const date = new Date(valorStr);
                return new Intl.DateTimeFormat('es-MX', { year: 'numeric', month: '2-digit', day: '2-digit' }).format(date);
            } catch (e) { return valorStr; }
        };
        const formatoPct = (v) => v ? parseFloat(v).toFixed(2) + '%' : '0.00%';

        // --- 1. Top Header Info ---
        document.getElementById('titulo-numero-contrato').textContent = data.Numero_Contrato || 'Contrato sin número';
        document.getElementById('lbl-objeto-contrato').textContent = data.Objeto_Contrato || 'Sin descripción';

        const badgeUbicacion = document.getElementById('badge-ubicacion-header');
        if (badgeUbicacion) {
            badgeUbicacion.innerHTML = `<svg class="w-3 h-3 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg> ${data.Ubicacion_Obra || 'No especificada'}`;
        }

        // --- 2. Hero Section (Dashboard) ---
        // Financiero
        const lblMontoHero = document.getElementById('resumen-total') || document.getElementById('lbl-monto-con-iva');
        if (lblMontoHero) lblMontoHero.textContent = formatoMoneda(data.Monto_Total_Con_IVA);

        // Tiempo
        const lblPlazoHero = document.getElementById('lbl-plazo-dias');
        if (lblPlazoHero) lblPlazoHero.textContent = (data.Plazo_Ejecucion_Dias || '0');

        const lblFechaFin = document.getElementById('lbl-fecha-fin');
        if (lblFechaFin) lblFechaFin.textContent = formatoFecha(data.Fecha_Fin_Obra);

        // Contratista
        const lblContratista = document.getElementById('lbl-contratista');
        if (lblContratista) lblContratista.textContent = data.Nombre_Contratista || data.ID_Contratista || 'No especificado';

        // --- 3. Cálculos de Progreso ---
        // Progreso de Tiempo (Días transcurridos vs Total)
        if (data.Fecha_Inicio_Obra && data.Fecha_Fin_Obra) {
            const inicio = new Date(data.Fecha_Inicio_Obra);
            const fin = new Date(data.Fecha_Fin_Obra);
            const hoy = new Date();

            const totalMs = fin - inicio;
            const transcurridoMs = hoy - inicio;

            let pctTiempo = 0;
            if (totalMs > 0) {
                pctTiempo = Math.min(100, Math.max(0, (transcurridoMs / totalMs) * 100));
            }

            // Actualizar Progress Bar de Tiempo (Opcional si decidimos separar las barras, 
            // por ahora en el hero financiero pusimos una de "Progreso de Ejecución")
            // Vamos a usar esa para el presupuesto y tal vez añadir una para tiempo.
        }

        // --- 4. Cards Detalle (Management Grid) ---
        document.getElementById('lbl-area-responsable').textContent = data.Area_Responsable || 'No especificada';
        document.getElementById('lbl-no-contrato-fisico').textContent = data.Numero_Contrato || '-';
        document.getElementById('lbl-no-concurso').textContent = data.No_Concurso || '-';
        document.getElementById('lbl-fecha-adjudicacion').textContent = formatoFecha(data.Fecha_Adjudicacion);
        document.getElementById('lbl-fecha-firma').textContent = formatoFecha(data.Fecha_Firma);

        document.getElementById('lbl-amortizacion-anticipo').textContent = formatoPct(data.Porcentaje_Amortizacion_Anticipo);
        document.getElementById('lbl-fianza-cumplimiento').textContent = data.No_Fianza_Cumplimiento || 'PENDIENTE';
        document.getElementById('lbl-fianza-anticipo').textContent = data.No_Fianza_Anticipo || 'N/A';

        document.getElementById('lbl-penas-convencionales').textContent = formatoPct(data.Porcentaje_Penas_Convencionales);
        document.getElementById('lbl-retencion-vigilancia').textContent = formatoPct(data.Retencion_Vigilancia_Pct);
        document.getElementById('lbl-otras-retenciones').textContent = formatoPct(data.Otras_Retenciones_Pct);

        document.getElementById('lbl-residente').textContent = data.Nombre_Residente_Dependencia || '-';
        document.getElementById('lbl-superintendente').textContent = data.Nombre_Superintendente_Contratista || '-';

        // --- 5. Estatus Visual (Badge Header) ---
        const badgeHeader = document.getElementById('badge-estado-contrato-header');
        let estadoStr = (data.Estado || 'N/A').toLowerCase();

        if (badgeHeader) {
            badgeHeader.textContent = estadoStr.toUpperCase();
            badgeHeader.className = "px-2 py-1 rounded-full text-sm font-black uppercase tracking-wider shadow-sm transition-all duration-300";

            if (estadoStr === 'activo') {
                badgeHeader.classList.add('bg-emerald-50', 'text-emerald-700', 'border', 'border-emerald-200');
            } else if (estadoStr === 'finalizado') {
                badgeHeader.classList.add('bg-blue-50', 'text-blue-700', 'border', 'border-blue-200');
            } else if (estadoStr === 'rescindido') {
                badgeHeader.classList.add('bg-rose-50', 'text-rose-700', 'border', 'border-rose-200');
            } else if (estadoStr === 'suspendido') {
                badgeHeader.classList.add('bg-amber-50', 'text-amber-700', 'border', 'border-amber-200');
            } else {
                badgeHeader.classList.add('bg-slate-50', 'text-slate-500', 'border', 'border-slate-200');
            }
        }

        // Almacenar data para edición posterior
        window.contratoActual = data;
    }

    /**
     * Abre el modal de edición y lo carga con la data actual almacenada en window.contratoActual.
     */
    window.abrirModalEditarDatosGenerales = function () {
        const data = window.contratoActual;
        if (!data) {
            console.error("No hay datos de contrato cargados para editar.");
            return;
        }

        const modal = document.getElementById('modal-editar-datos-generales');
        const form = document.getElementById('form-editar-datos-generales');
        if (!modal || !form) return;

        // Limpiar form y setear valores
        form.reset();

        // Función helper para formatear fechas para input type="date"
        const isoDate = (str) => {
            if (!str) return '';
            try {
                const date = new Date(str);
                if (isNaN(date.getTime())) return '';
                return date.toISOString().split('T')[0];
            } catch (e) { return ''; }
        };

        // Poblar campos usando el atributo name de los inputs
        const inputs = form.querySelectorAll('input, textarea, select');
        inputs.forEach(input => {
            const field = input.getAttribute('name');
            if (field && data[field] !== undefined) {
                if (input.type === 'date') {
                    input.value = isoDate(data[field]);
                } else {
                    input.value = data[field];
                }
            }
        });

        modal.classList.remove('hidden');
        document.body.classList.add('overflow-hidden');
    };

        const modal = document.getElementById('modal-editar-datos-generales');
        if (modal) modal.classList.add('hidden');
        document.body.classList.remove('overflow-hidden');
    };

    window.liveUpdateSobrecosto = function (isPrimary = false) {
        const form = document.getElementById('form-sobrecostos');
        const getVal = (name) => parseFloat(form.querySelector(`[name="${name}"]`).value) || 0;
        const setVal = (name, val) => {
            const el = form.querySelector(`[name="${name}"]`);
            if (el) el.value = val.toFixed(4);
        };

        let indOfi = getVal('Pct_Indirectos_Oficina');
        let indCam = getVal('Pct_Indirectos_Campo');
        let indTot = getVal('Pct_Indirectos_Totales');

        // Lógica de prioridad
        if (isPrimary) {
            // El usuario editó el total manualmente. 
            // Podríamos intentar repartirlo, pero por ahora solo respetamos el total.
        } else {
            // El usuario editó Oficina o Campo, sincronizamos el total.
            indTot = indOfi + indCam;
            setVal('Pct_Indirectos_Totales', indTot);
        }

        const finPct = getVal('Pct_Financiamiento');
        const utiPct = getVal('Pct_Utilidad');
        const sfpPct = getVal('Pct_Cargos_SFP');
        const isnPct = getVal('Pct_ISN');

        const DIRECTO = 100.00; // Base de simulación

        // 1. Indirectos (Usamos el TOTAL)
        const indMonto = DIRECTO * (indTot / 100);
        const sub1 = DIRECTO + indMonto;

        // 2. Financiamiento
        const finMonto = sub1 * (finPct / 100);
        const sub2 = sub1 + finMonto;

        // 3. Utilidad
        const utiMonto = sub2 * (utiPct / 100);
        const sub3 = sub2 + utiMonto;

        // 4. Cargos Adicionales
        const sfpMonto = sub3 * (0.005025); // Factor 5 al millar simplificado (0.5% / 0.995)
        const isnMonto = DIRECTO * (isnPct / 100);
        const cargosTotal = sfpMonto + isnMonto;

        const puFinal = sub3 + cargosTotal;
        const factorSobreprecio = puFinal / DIRECTO;

        // Actualizar UI Preview
        const setTxt = (id, val, isPrice = true) => {
            const el = document.getElementById(id);
            if (el) el.innerText = isPrice ? val.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) : val.toFixed(4);
        };

        setTxt('prev-pct-ind', indTot, false);
        setTxt('prev-val-ind', indMonto);
        setTxt('prev-sub1', sub1);

        setTxt('prev-pct-fin', finPct, false);
        setTxt('prev-val-fin', finMonto);
        setTxt('prev-sub2', sub2);

        setTxt('prev-pct-util', utiPct, false);
        setTxt('prev-val-util', utiMonto);
        setTxt('prev-sub3', sub3);

        setTxt('prev-val-cargos', cargosTotal);
        setTxt('prev-pu-final', puFinal);
        setTxt('prev-fs', factorSobreprecio, false);
    };

    window.guardarFactoresSobrecosto = function () {
        const form = document.getElementById('form-sobrecostos');
        const idContrato = window.vistaActualParams ? window.vistaActualParams.id : null;
        if (!idContrato || !form) return;

        Swal.fire({
            title: '¿Aplicar Sobrecostos?',
            text: "Se actualizarán todos los Precios Unitarios del catálogo basándose en los porcentajes definidos. Esta acción modificará permanentemente el catálogo.",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#059669',
            cancelButtonColor: '#64748b',
            confirmButtonText: 'Sí, aplicar a todo el catálogo',
            cancelButtonText: 'Cancelar'
        }).then((result) => {
            if (result.isConfirmed) {
                toggleSpinner(true);
                const formData = new FormData(form);
                const factores = {};
                formData.forEach((v, k) => factores[k] = parseFloat(v) || 0);

                google.script.run
                    .withSuccessHandler(res => {
                        toggleSpinner(false);
                        if (res.success) {
                            notificar('Éxito', 'Factores aplicados y catálogo actualizado correctamente.', 'success');
                            window.cerrarModalSobrecostos();
                            renderizarContratoDetalle(idContrato); // Recargar vista
                        } else {
                            notificar('Error', res.error, 'error');
                        }
                    })
                    .aplicarFactoresSobrecostoCatalogo(idContrato, factores);
            }
        });
    };

        if (!idContrato || !form) return;

        toggleSpinner(true);

        const formData = new FormData(form);
        const nuevosDatos = {};

            nuevosDatos[key] = value;
        });

            .withSuccessHandler(function (res) {
                if (res.success) {
                    // Refrescar la vista completa para ver los cambios
                    inicializarContratoDetalle({ id: idContrato });

    /**
     * Intercambia la posición de un concepto en la interfaz y guarda el nuevo orden.
     */
    function moverConcepto(btn, direccion) {
        const tr = btn.closest('tr');
        const tbody = tr.parentNode;

        if (direccion === 'up') {
            const prev = tr.previousElementSibling;
            if (prev && prev.dataset.id) {
                tbody.insertBefore(tr, prev);
            } else {
                return; // Ya es el primero
            }
        } else {
            const next = tr.nextElementSibling;
            if (next && next.dataset.id) {
                tbody.insertBefore(next, tr);
            } else {
                return; // Ya es el último
            }
        }

        // Obtener nuevo orden de IDs
        const ids = Array.from(tbody.querySelectorAll('tr[data-id]')).map(row => row.dataset.id);
        syncOrdenConceptos(ids);
    }

    /**
     * Sincroniza el orden de los conceptos con el servidor.
     */
    function syncOrdenConceptos(listaIds) {
        const idContrato = window.vistaActualParams ? window.vistaActualParams.id : null;
        if (!idContrato) return;

        // 1. Mostrar Spinner Global (Bloqueo Total)
        toggleSpinner(true, "Guardando nuevo orden y sincronizando programa...");

        google.script.run
            .withSuccessHandler(function (res) {
                toggleSpinner(false);
                if (!res.success) {
                    manejarError(res);
                } else {
                    // 2. Actualizar el estado local (window.conceptosActuales)
                    if (window.conceptosActuales) {
                        const nuevoMapa = {};
                        listaIds.forEach((id, index) => nuevoMapa[id] = index);
                        window.conceptosActuales.sort((a, b) => nuevoMapa[a.ID_Concepto] - nuevoMapa[b.ID_Concepto]);
                    }
                }
            })
            .withFailureHandler(function (err) {
                toggleSpinner(false);
                manejarError({ error: err.message, functionName: 'syncOrdenConceptos' });
            })
            .actualizarOrdenConceptos(idContrato, listaIds);
    }

    /**
     * Habilita la edición de todas las celdas en una fila específica.
     */
    function habilitarEdicionFila(btn) {
        const tr = btn.closest('tr');
        const idConcepto = tr.getAttribute('data-id');
        const concepto = (window.conceptosActuales || []).find(c => String(c.ID_Concepto) === String(idConcepto));
        const tieneMatriz = concepto ? concepto.Tiene_Matriz : false;

        const celdas = tr.querySelectorAll('.celda-editable');
        const isEditing = tr.dataset.editing === 'true';

        if (!isEditing) {
            // Entrar en modo edición
            tr.dataset.editing = 'true';
            celdas.forEach(c => {
                // Si tiene matriz, NO permitir editar el Precio Unitario (col-precio)
                if (tieneMatriz && c.classList.contains('col-precio')) {
                    c.setAttribute('contenteditable', 'false');
                    c.style.backgroundColor = '#f8fafc'; // slate-50
                    c.style.color = '#94a3b8'; // slate-400
                    c.title = "Protegido: Existe una matriz asociada.";
                } else {
                    c.setAttribute('contenteditable', 'true');
                }
                c.dataset.original = c.innerText;
            });

            // Cambiar icono a "Check" (Guardar)
            btn.innerHTML = `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>`;
            btn.classList.replace('text-blue-600', 'text-emerald-600');
            btn.classList.replace('hover:bg-blue-50', 'hover:bg-emerald-50');
            btn.title = "Guardar Cambios";

            // Enfocar la primera celda editable real
            const firstEditable = Array.from(celdas).find(c => c.getAttribute('contenteditable') === 'true');
            if (firstEditable) firstEditable.focus();
        } else {
            // Guardar cambios
            guardarFila(tr, btn);
        }
    }

    /**
     * Aplica formato visual a la celda al perder el foco (blur).
     */
    function formatearCelda(celda, tipo) {
        let valorRaw = celda.innerText.replace(/[^0-9.-]+/g, "");
        let valor = parseFloat(valorRaw) || 0;

        if (tipo === 'precio') {
            celda.innerText = formatoMoneda(valor);
        } else if (tipo === 'cantidad') {
            // Formato con hasta 4 decimales
            celda.innerText = new Intl.NumberFormat('es-MX', {
                minimumFractionDigits: 2,
                maximumFractionDigits: 4
            }).format(valor);
        } else {
            celda.innerText = celda.innerText.trim();
        }
    }

    /**
     * Sincroniza los datos de la fila con el servidor y vuelve a modo lectura.
     */
    function guardarFila(tr, btn) {
        const idConcepto = tr.dataset.id;
        const idContrato = window.vistaActualParams ? window.vistaActualParams.id : null;

        const datos = {
            ID_Concepto: idConcepto,
            ID_Contrato: idContrato,
            Clave: tr.cells[0].innerText.trim(), // Ajustado índice tras quitar col drag
            Descripcion: tr.cells[1].innerText.trim(),
            Unidad: tr.cells[2].innerText.trim(),
            Cantidad_Contratada: tr.cells[3].innerText.replace(/[^0-9.-]+/g, ""),
            Precio_Unitario: tr.cells[4].innerText.replace(/[^0-9.-]+/g, "")
        };

        // BLOQUEO TOTAL DE UI
        toggleSpinner(true, "Guardando cambios en catálogo...");

        google.script.run
            .withSuccessHandler(function (res) {
                toggleSpinner(false);
                if (res.success) {
                    // Volver a modo lectura
                    tr.dataset.editing = 'false';
                    tr.querySelectorAll('.celda-editable').forEach(c => c.setAttribute('contenteditable', 'false'));

                    // Restaurar icono original (Lápiz)
                    btn.innerHTML = `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>`;
                    btn.classList.remove('text-emerald-600', 'hover:bg-emerald-50');
                    btn.classList.add('text-blue-600', 'hover:bg-blue-50');
                    btn.title = "Editar Fila";

                    // Feedback de éxito
                    tr.classList.add('bg-emerald-50');
                    setTimeout(() => tr.classList.remove('bg-emerald-50'), 600);

                    // Actualizar estado local
                    if (window.conceptosActuales) {
                        const idx = window.conceptosActuales.findIndex(con => String(con.ID_Concepto) === String(idConcepto));
                        if (idx !== -1) window.conceptosActuales[idx] = res.data;
                    }
                } else {
                    manejarError(res);
                }
            })
            .withFailureHandler(function (err) {
                toggleSpinner(false);
                manejarError({ error: err.message, functionName: 'guardarFila' });
            })
            .upsertConcepto(datos);
    }

    /**
     * Recalcula el importe de la fila y el total general instantáneamente.
     */
    function recalcularFila(celda) {
        const tr = celda.closest('tr');
        const cant = parseFloat(tr.querySelector('.col-cantidad').innerText.replace(/[^0-9.-]+/g, "")) || 0;
        const pu = parseFloat(tr.querySelector('.col-precio').innerText.replace(/[^0-9.-]+/g, "")) || 0;
        const tdImporte = tr.querySelector('.col-importe');

        const importe = cant * pu;
        tdImporte.innerText = formatoMoneda(importe);

        // Recalcular Total General sumando todas las filas visibles
        let subtotal = 0;
        document.querySelectorAll('#tabla-conceptos-body tr[data-id]').forEach(fila => {
            const imp = parseFloat(fila.querySelector('.col-importe').innerText.replace(/[^0-9.-]+/g, "")) || 0;
            subtotal += imp;
        });

        const iva = subtotal * 0.16;
        const total = subtotal + iva;

        // Actualizar visualmente los totales de la tabla
        const lblSinIva = document.getElementById('lbl-monto-sin-iva');
        if (lblSinIva) lblSinIva.textContent = formatoMoneda(subtotal);

        const lblConIva = document.getElementById('resumen-total') || document.getElementById('lbl-monto-con-iva');
        if (lblConIva) lblConIva.textContent = formatoMoneda(total);

        // Actualizar los summaries al final de la tabla (si se encuentran)
        // Por simplicidad en este paso solo actualizamos las tarjetas globales
    }

    document.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' && e.target.getAttribute('contenteditable') === 'true') {
            e.preventDefault();
            e.target.blur();
        }

    /**
     * Crea un nuevo concepto vacío en el servidor y refresca la tabla.
     */
    function agregarConceptoInPlace() {
        const idContrato = window.vistaActualParams ? window.vistaActualParams.id : null;
        if (!idContrato) return;

        toggleSpinner(true);
        const nuevoConcepto = {
            ID_Contrato: idContrato,
            Clave: 'NUEVO',
            Descripcion: 'Nuevo Concepto',
            Unidad: 'UNID',
            Cantidad_Contratada: 0,
            Precio_Unitario: 0
        };

        google.script.run
            .withSuccessHandler(function (res) {
                toggleSpinner(false);
                if (res.success) {
                    // Recargar conceptos para ver la nueva fila
                    google.script.run
                        .withSuccessHandler(function (respC) {
                            if (respC.success) {
                                renderizarConceptos(respC.data);
                                // Opcional: Podríamos hacer scroll al final o enfocar la nueva fila
                            }

                }
            })
            .withFailureHandler(function (err) {
                toggleSpinner(false);
                manejarError({ error: err.message, functionName: 'agregarConceptoInPlace' });

    /**

    /**
     * Renderiza el panel de resumen financiero del contrato en el dashboard.
     */
    function renderizarResumenFinanciero(data) {
        const panel = document.getElementById('panel-resumen-financiero-contrato');
        if (!panel) return;

        const formatoM = (v) => new Intl.NumberFormat('es-MX', { style: 'currency', currency: 'MXN' }).format(v || 0);
        const formatoP = (v) => v ? parseFloat(v).toFixed(2) + '%' : '0.00%';

        if (document.getElementById('resumen-cd')) document.getElementById('resumen-cd').textContent = formatoM(data.Costo_Directo);
        if (document.getElementById('resumen-ind')) document.getElementById('resumen-ind').textContent = formatoM(data.Indirectos);
        if (document.getElementById('resumen-pct-ind')) document.getElementById('resumen-pct-ind').textContent = formatoP(data.Factores.Pct_Indirectos);

        if (document.getElementById('resumen-fin')) document.getElementById('resumen-fin').textContent = formatoM(data.Financiamiento);
        if (document.getElementById('resumen-pct-fin')) document.getElementById('resumen-pct-fin').textContent = formatoP(data.Factores.Pct_Financiamiento);

        if (document.getElementById('resumen-util')) document.getElementById('resumen-util').textContent = formatoM(data.Utilidad);
        if (document.getElementById('resumen-pct-util')) document.getElementById('resumen-pct-util').textContent = formatoP(data.Factores.Pct_Utilidad);

        if (document.getElementById('resumen-cargos')) document.getElementById('resumen-cargos').textContent = formatoM(data.Cargos_Adicionales);
        if (document.getElementById('resumen-pct-cargos')) document.getElementById('resumen-pct-cargos').textContent = formatoP(data.Factores.Pct_SFP);

        if (document.getElementById('resumen-total')) document.getElementById('resumen-total').textContent = formatoM(data.Precio_Unitario_Total);

        panel.classList.remove('hidden');
    }

    /**
     * Recalcula montos y porcentajes en la fila del programa en tiempo real.
     */
    window.recalcularFilaPrograma = function (celda, tipo) {
        const tr = celda.closest('tr');
        const tdParent = celda.closest('td');
        const idConcepto = tr.dataset.id;

        // 1. Obtener el subtotal general del contrato (Catalog)
        const subtotalContrato = (window.conceptosActuales || []).reduce((acc, c) => acc + (parseFloat(c.Importe_Total_Sin_IVA) || 0), 0) || 1;
        const conceptoOrig = (window.conceptosActuales || []).find(c => String(c.ID_Concepto) === String(idConcepto));
        if (!conceptoOrig) return;
        const totalConcepto = parseFloat(conceptoOrig.Importe_Total_Sin_IVA) || 0;

        let montoDiv = tdParent.querySelector('[data-tipo="monto"]');
        let pctDiv = tdParent.querySelector('[data-tipo="pct"]');

        if (tipo === 'monto') {
            const valMonto = parseFloat(montoDiv.innerText.replace(/[^0-9.-]+/g, "")) || 0;
            const nuevoPct = subtotalContrato > 0 ? (valMonto / subtotalContrato) : 0;
            pctDiv.innerText = (nuevoPct * 100).toFixed(4) + '%';
        } else {
            const valPct = parseFloat(pctDiv.innerText.replace(/[^0-9.-]+/g, "")) || 0;
            const nuevoMonto = subtotalContrato * (valPct / 100);
            montoDiv.innerText = formatoMoneda(nuevoMonto).replace('$', '').trim();
        }

        // 2. Actualizar Total de Fila (Horizontal) e Indicador de Tope
        let sumaFila = 0;
        tr.querySelectorAll('[data-tipo="monto"]').forEach(d => {
            sumaFila += parseFloat(d.innerText.replace(/[^0-9.-]+/g, "")) || 0;
        });

        const tdTotalFila = tr.querySelector('.col-total-fila div');
        const indicator = tr.querySelector('.indicator-remanente');

        if (tdTotalFila) {
            tdTotalFila.innerText = formatoMoneda(sumaFila);
            // Validación Visual de Tope
            if (sumaFila > (totalConcepto + 0.01)) {
                tdTotalFila.classList.add('text-red-600', 'animate-pulse');
                tdTotalFila.classList.remove('text-slate-800');
                if (indicator) {
                    indicator.innerText = 'Exceso!';
                    indicator.classList.add('text-red-500');
                    indicator.classList.remove('text-slate-400');
                }
            } else {
                tdTotalFila.classList.remove('text-red-600', 'animate-pulse');
                tdTotalFila.classList.add('text-slate-800');
                if (indicator) {
                    if (sumaFila < (totalConcepto - 0.01)) {
                        indicator.innerText = 'Falta: ' + formatoMoneda(totalConcepto - sumaFila);
                        indicator.classList.remove('text-red-500');
                        indicator.classList.add('text-slate-400');
                    } else {
                        indicator.innerText = 'Completo';
                        indicator.classList.remove('text-red-500');
                        indicator.classList.add('text-slate-400');
                    }
                }
            }
        }

        // 3. Actualizar Totales Verticales y Gran Total
        const tbody = document.getElementById('tabla-programa-body');
        const rows = Array.from(tbody.querySelectorAll('tr[data-id]'));
        const meses = window.programaActual ? window.programaActual.meses : [];
        const numCols = meses.length;
        const totalesVerticales = new Array(numCols).fill(0);
        let granTotalCalculado = 0;

        rows.forEach(row => {
            row.querySelectorAll('[data-tipo="monto"]').forEach((mCell, idxCol) => {
                const val = parseFloat(mCell.innerText.replace(/[^0-9.-]+/g, "")) || 0;
                totalesVerticales[idxCol] += val;
                granTotalCalculado += val;
            });
        });

        // 4. Actualizar Filas de Resumen (4 filas al final del body)
        const summaryRows = tbody.querySelectorAll('tr:not([data-id])');
        // Identificar filas por su texto o orden (f1: Importes, f2: %, f3: Acumulado, f4: Avance)
        const f1 = summaryRows[0];
        const f2 = summaryRows[1];
        const f3 = summaryRows[2];
        const f4 = summaryRows[3];

        let acumulado = 0;
        totalesVerticales.forEach((tv, idx) => {
            acumulado += tv;
            // Update f1 (Importe) - cell index starts at 1 because of colspan=2
            if (f1 && f1.cells[idx + 1]) f1.cells[idx + 1].innerText = formatoMoneda(tv);
            // Update f2 (%)
            if (f2 && f2.cells[idx + 1]) f2.cells[idx + 1].innerText = granTotalCalculado > 0 ? ((tv / granTotalCalculado) * 100).toFixed(4) + '%' : '0.0000%';
            // Update f3 (Acumulado)
            if (f3 && f3.cells[idx + 1]) f3.cells[idx + 1].innerText = formatoMoneda(acumulado);
            // Update f4 (Avance %)
            if (f4 && f4.cells[idx + 1]) f4.cells[idx + 1].innerText = granTotalCalculado > 0 ? ((acumulado / granTotalCalculado) * 100).toFixed(4) + '%' : '0.0000%';
        });

        // Update gran total cells in summary rows
        if (f1 && f1.cells[numCols + 1]) f1.cells[numCols + 1].innerText = formatoMoneda(granTotalCalculado);
        if (f3 && f3.cells[numCols + 1]) f3.cells[numCols + 1].innerText = formatoMoneda(granTotalCalculado);
    }

    /**

     */
    window.autoGuardarPeriodo = function (celda) {
        if (celda.innerText === celda.dataset.original) return; // No hubo cambio real

        const tr = celda.closest('tr');
        const tdParent = celda.closest('td');
        const idContrato = window.vistaActualParams ? window.vistaActualParams.id : null;
        const idConcepto = tr.dataset.id;
        const idPrograma = window.programaActualId;
        const idPeriodo = celda.dataset.idPeriodo;

        const montoVal = parseFloat(tdParent.querySelector('[data-tipo="monto"]').innerText.replace(/[^0-9.-]+/g, "")) || 0;

        tdParent.classList.add('bg-blue-50');
        toggleSpinner(true, "Actualizando periodo...");

        google.script.run
            .withSuccessHandler(function (res) {
                toggleSpinner(false);
                setTimeout(() => tdParent.classList.remove('bg-blue-50'), 400);
                if (!res.success) {
                    tdParent.classList.add('bg-red-50');
                    setTimeout(() => tdParent.classList.remove('bg-red-50'), 2000);
                    manejarError(res);
                } else {
                    // Re-formatear con precisión al éxito (blur)
                    const mDiv = tdParent.querySelector('[data-tipo="monto"]');
                    const pDiv = tdParent.querySelector('[data-tipo="pct"]');

                    const valMonto = parseFloat(mDiv.innerText.replace(/[^0-9.-]+/g, "")) || 0;
                    const valPct = parseFloat(pDiv.innerText.replace(/[^0-9.-]+/g, "")) || 0;

                    mDiv.innerText = formatoMoneda(valMonto);
                    pDiv.innerText = valPct.toFixed(4) + '%';

                    mDiv.dataset.original = mDiv.innerText;
                    pDiv.dataset.original = pDiv.innerText;
                }
            })
            .withFailureHandler(function (err) {
                toggleSpinner(false);
                tdParent.classList.remove('bg-blue-50');
                tdParent.classList.add('bg-red-50');
                setTimeout(() => tdParent.classList.remove('bg-red-50'), 2000);
                manejarError({ error: err.message, functionName: 'autoGuardarPeriodo' });

    /**
     * Lógica de generación automática basada en el tipo de programa.
     */
    window.generarEstructuraAutomatica = function (forzando = false) {
        const inputTipo = document.getElementById('config-prog-tipo');
        let rawProp = inputTipo.value || 'MENSUAL';

        // Mapeo interno para compatibilidad con la lógica previa
        const freqMap = {
            'MENSUAL': 'Mensual',
            'QUINCENAL': 'Quincenal',
            'SEMANAL': 'Semanal'
        };
        const freq = freqMap[rawProp] || 'Mensual';
        const fIniStr = document.getElementById('config-prog-inicio').value;
        const fFinStr = document.getElementById('config-prog-fin').value;

        if (!fIniStr || !fFinStr) {
            alert("Favor de definir fechas de inicio y término contractuales.");
            return;
        }

        const targetStart = new Date(fIniStr + 'T00:00:00');
        const targetEnd = new Date(fFinStr + 'T00:00:00');
        const pers = [];
        let curr = new Date(targetStart);
        let count = 1;

        while (curr <= targetEnd) {
            let start = new Date(curr);
            let end;

            if (freq === 'Semanal') {
                end = new Date(curr);
                end.setDate(end.getDate() + 6);
            } else if (freq === 'Quincenal') {
                // Ciclos de 15 días: 1 al 15 y 16 al fin de mes (o similar)
                // Regla estándar pedida: del 1 al 15, y del 16 al 30/31
                if (curr.getDate() <= 15) {
                    end = new Date(curr.getFullYear(), curr.getMonth(), 15);
                } else {
                    end = new Date(curr.getFullYear(), curr.getMonth() + 1, 0);
                }
            } else { // Mensual
                // Inicia el X, termina el X-1 del siguiente mes
                end = new Date(curr.getFullYear(), curr.getMonth() + 1, curr.getDate() - 1);
            }

            // Cap al final del contrato
            if (end > targetEnd) end = new Date(targetEnd);

            pers.push({
                ID_Programa_Periodo: "auto_" + count,
                Numero_Periodo: count,
                Periodo: `Periodo ${count}`,
                Fecha_Inicio: start.toISOString(),
                Fecha_Termino: end.toISOString()
            });

            // Siguiente inicio = end + 1
            curr = new Date(end);
            curr.setDate(curr.getDate() + 1);
            count++;

            if (count > 200) break; // Safe break
        }

        window.renderPeriodosModal(pers);
    }

    function updateAIStatus(show, message = "Procesando...", subtext = "Esto puede tomar unos segundos") {
        const overlay = document.getElementById('ai-processing-overlay');

    /**
     * Inicializa los eventos de Drag & Drop para el Importador IA.
     */
    function inicializarImportadorIA() {
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input-ia');

        if (!dropZone) return;

        // Abrir selector al hacer clic
        dropZone.onclick = () => fileInput.click();

        // Eventos de Arrastre
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, e => {
                e.preventDefault();
                e.stopPropagation();
            }, false);
        });

        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.add('drag-over'), false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.remove('drag-over'), false);
        });

        // Manejar Soltado
        dropZone.addEventListener('drop', e => {
            const dt = e.dataTransfer;
            const files = dt.files;
            handleFilesIA(files);
        }, false);

        // Manejar Selección por clic
        fileInput.onchange = e => handleFilesIA(e.target.files);
    }

    function handleFilesIA(files) {
        const file = files[0];
        if (!file) return;

        // Mantener modal abierto y mostrar status inicial
        updateAIStatus(true, "Leyendo archivo...", "Preparando datos para el Agente IA");

        const reader = new FileReader();
        reader.onload = function (evt) {
            const base64Data = evt.target.result;
            const mimeType = file.type;
            const targetTable = document.getElementById('import-type-actual').value;

            updateAIStatus(true, "Analizando con Agente IA...", "Extrayendo datos estructurados del documento");

            const parentContext = {
                ID_Contrato: window.idContratoActual || null,
                ID_Concepto: window.idConceptoMatrizActual || null,
                ID_Estimacion: window.idEstimacionActual || null,
                No_Estimacion: window.noEstimacionActual || null,
                Objeto_Contrato: window.objetoContratoActual || null,
                Monto_Total_Contrato: window.montoTotalContratoActual || null
            };

            google.script.run
                .withSuccessHandler(function (resIA) {
                    if (resIA && resIA.success) {
                        const datosExtraidos = resIA.data.datos || resIA.data; // Compatibilidad con estructura nueva o vieja
                        const informeAuditoria = resIA.data.informe_auditoria || null;
                        const checklistAuditoria = resIA.data.checklist_auditoria || null;

                        updateAIStatus(true, "Sincronizando Catálogo...", "Haciendo match inteligente de conceptos por descripción");

                        google.script.run
                            .withSuccessHandler(function (resDiff) {
                                if (resDiff && resDiff.success) {
                                    const cambios = resDiff.data;
                                    cerrarModalImportacionIA();

                                    mostrarAdvertenciaCambiosIA(cambios, datosExtraidos, informeAuditoria);

                                    // Renderizar checklist en el panel de auditoría de la estimación
                                    if (checklistAuditoria && typeof renderizarChecklistAuditoria === 'function') {
                                        renderizarChecklistAuditoria(checklistAuditoria);
                                    }

                                    // Persistir resultado de auditoría en Validacion_Archivos
                                    if (window.idEstimacionActual && (checklistAuditoria || informeAuditoria)) {
                                        const tipoArchivo = 'CARATULA_GENERADOR'; // Default; se puede expandir para 'FACTURA_BORRADOR'
                                        const estadoVal = informeAuditoria
                                            ? (informeAuditoria.estado_validacion === 'CORRECTO' ? 'APROBADO' : 'CON_ERRORES')
                                            : 'PENDIENTE';
                                        const observaciones = informeAuditoria
                                            ? (informeAuditoria.observaciones || []).join(' | ')
                                            : '';
                                        google.script.run.guardarValidacionArchivo(
                                            window.idEstimacionActual,
                                            tipoArchivo,
                                            estadoVal,
                                            checklistAuditoria || [],
                                            observaciones
                                        );
                                    }
                                } else {
                                    updateAIStatus(true, "Error en comparativa", resDiff.error || "No se pudo analizar los cambios");
                                    setTimeout(() => updateAIStatus(false), 3000);
                                    manejarError(resDiff);
                                }
                            })
                            .withFailureHandler(function (err) {
                                updateAIStatus(true, "Error de red", err.message);
                                setTimeout(() => updateAIStatus(false), 3000);
                                manejarError({ error: err.message });
                            })
                            .analizarCambiosIA(datosExtraidos);
                    } else {
                        updateAIStatus(true, "Error en Agente IA", resIA?.error || "La IA no pudo procesar el archivo");
                        setTimeout(() => updateAIStatus(false), 3000);
                        manejarError(resIA || { success: false, error: "Error en el procesamiento IA", functionName: "processDocumentWithAI" });
                    }
                })
                .withFailureHandler(function (err) {
                    updateAIStatus(true, "Error de conexión", err.message);
                    setTimeout(() => updateAIStatus(false), 3000);
                    manejarError({ error: err.message, functionName: 'processDocumentWithAI' });
                })
                .processDocumentWithAI(base64Data, mimeType, targetTable, parentContext);
        };
        reader.onerror = function () {
            updateAIStatus(true, "Error al leer archivo", "El navegador no pudo leer el archivo local");
            setTimeout(() => updateAIStatus(false), 3000);
        };
        reader.readAsDataURL(file);
    }

    /**
     * ORQUESTADOR DE IMPORTACIÓN POR LOTES (BATCH)
     * Procesa secuencialmente: 1. Contrato -> 2. CAF -> 3. Programa -> 4. APU
     */
    window.lanzarOrquestadorBatchIA = async function (queue) {
        const order = [1, 2, 3, 4];
        const types = { 1: 'Contratos', 2: 'CAF', 3: 'Programa', 4: 'Matriz_Insumos' };

        // Mostrar Modal de IA y ponerlo en modo "Batch"
        configurarRebrandModalIA('Batch');
        document.getElementById('modal-importacion-ia').classList.remove('hidden');
        updateAIStatus(true, "Iniciando Lote...", "Preparando secuencia de 4 documentos");

        try {
            for (let step of order) {
                const file = queue[step];
                if (!file) continue;

                updateAIStatus(true, `Paso ${step}/4: Procesando ${types[step]}`, `Leyendo y analizando ${file.name}...`);

                // Convertir archivo a base64
                const base64Data = await new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = (e) => resolve(e.target.result);
                    reader.readAsDataURL(file);
                });

                // Simular el flujo de handleFilesIA pero de forma controlada y lineal
                await procesarPasoBatch(base64Data, file.type, types[step]);
            }

            Swal.fire({
                title: 'Lote Completado',
                text: 'Se han procesado todos los documentos del expediente.',
                icon: 'success',
                confirmButtonColor: '#611232'
            });
            cerrarModalImportacionIA();
            if (typeof inicializarContratos === 'function') inicializarContratos();

        } catch (error) {
            console.error("Error en Batch:", error);
            updateAIStatus(true, "Error en Lote", error.message || "Ocurrió un error en el procesamiento");
            setTimeout(() => updateAIStatus(false), 5000);
        }
    };

    /**
     * Helper para procesar un paso individual del batch de forma asíncrona (Promisified google.script.run)
     */
    async function procesarPasoBatch(content, mimeType, targetTable) {
        const context = {
            ID_Contrato: window.idContratoActual || null,
            ID_Concepto: window.idConceptoMatrizActual || null
        };

        // 1. Llamada a la IA
        const resIA = await new Promise((resolve, reject) => {
            google.script.run
                .withSuccessHandler(resolve)
                .withFailureHandler(reject)
                .processDocumentWithAI(content, mimeType, targetTable, context);
        });

        if (!resIA || !resIA.success) throw new Error(resIA?.error || "IA falló en " + targetTable);

        const extracted = resIA.data.datos || resIA.data;

        // 2. Analizar Cambios (Match/Diff)
        const resDiff = await new Promise((resolve, reject) => {
            google.script.run
                .withSuccessHandler(resolve)
                .withFailureHandler(reject)
                .analizarCambiosIA(extracted);
        });

        if (!resDiff || !resDiff.success) throw new Error("Error en comparativa de " + targetTable);

        // 3. Guardado Automático (En Batch no pedimos confirmación de advertencias a menos que sea crítico?)
        // Por ahora, guardamos directamente para permitir flujo fluido, o podríamos mostrar un 'Review' rápido?
        // El usuario pidió "Cargar todos para comenzar", implicando un proceso automatizado.
        const resSave = await new Promise((resolve, reject) => {
            google.script.run
                .withSuccessHandler(resolve)
                .withFailureHandler(reject)
                .guardarDatosIA(extracted);
        });

        if (!resSave || !resSave.success) throw new Error("Error guardando datos de " + targetTable);

        // Actualizar estados globales si es Contrato para que los siguientes pasos tengan ID
        if (targetTable === 'Contratos' && resSave.detalles && resSave.detalles.id_contrato) {
            window.idContratoActual = resSave.detalles.id_contrato;
        }

        return resSave;
    }
