    /**
     * ORQUESTADOR DE IMPORTACIÓN POR LOTES (BATCH)
     * Procesa secuencialmente: 1. Contrato -> 2. CAF -> 3. Programa -> 4. APU
     */
    window.lanzarOrquestadorBatchIA = async function (queue) {
        // Orden solicitado estricto: 1 (Contratos) -> 2 (CAF) -> 3 (Programa) -> 4 (APU) -> 5 (Fianza)
        const order = [1, 2, 3, 4, 5];
        const types = { 1: 'Contratos', 2: 'CAF', 3: 'Programa', 4: 'Matriz_Insumos', 5: 'Fianza' };

        let idConvenioExtraido = null;
        let idContratoExtraido = null;
        let catalogoDesdePrograma = null;

        // Deshabilitar botón y cambiar texto
        const btn = document.getElementById('btn-iniciar-batch');
        if (btn) {
            btn.disabled = true;
            btn.innerHTML = `<svg class="w-5 h-5 mr-3 animate-spin text-white" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Procesando Expediente...`;
        }

        try {
            for (let step of order) {
                const file = queue[step];
                if (!file) continue;

                // Marcar slot como procesando
                marcarSlotProcesando(step);

                // Convertir archivo a base64
                const base64Data = await new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = (e) => resolve(e.target.result);
                    reader.readAsDataURL(file);
                });

                let mimeType = file.type || 'application/pdf';
                const fileName = (file.name || '').toLowerCase();
                if ((!mimeType || mimeType === 'application/octet-stream') && (fileName.endsWith('.xlsx') || fileName.endsWith('.xls'))) {
                    mimeType = 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet';
                }

                // Inyectar contexto según el paso
                let contextParaIA = {};
                if (idContratoExtraido) contextParaIA.ID_Contrato = idContratoExtraido;
                
                // LA CLAVE ESTÁ AQUÍ: Inyectar el catálogo al procesar las APU (Paso 4)
                if (step === 4 && catalogoDesdePrograma) {
                    contextParaIA.Catalogo_Contextual = catalogoDesdePrograma;
                    contextParaIA.Instruccion_Especial = "Usa estrictamente las Claves de este Catalogo_Contextual. No inventes claves nuevas. Solo asocia los insumos a estas claves y actualiza los Costos Directos.";
                }

                // Procesar silenciosamente y capturar resultados
                const resultado = await procesarPasoBatchInPlace(base64Data, mimeType, types[step], contextParaIA);

                // Guardar datos en memoria para el siguiente paso
                if (step === 2) {
                    // ID_Convenio si se creó/encontró
                    idConvenioExtraido = resultado?.ids?.Convenios_Recurso || null;
                } else if (step === 1) {
                    // ID_Contrato obtenido del paso 1
                    idContratoExtraido = resultado?.ids?.Contratos || null;
                } else if (step === 3) {
                    // El catálogo de conceptos para el matching de APU
                    catalogoDesdePrograma = resultado?.datos?.Catalogo_Conceptos || null;
                } else if (step === 5) {
                    const validacionFianza = resultado?.fullResponse?.validacion;
                    if (validacionFianza) {
                        window.fianzaValidationResult = validacionFianza;
                    }
                }

                // Marcar slot como completado
                marcarSlotCompletado(step);
            }

            // Mostrar Modal Final de Resumen
            setTimeout(() => {
                if (window.fianzaValidationResult && window.fianzaValidationResult.porcentaje_similitud < 95) {
                    Swal.fire({
                        title: '⚠️ Advertencia de Fianza',
                        text: `El borrador de fianza tiene una similitud del ${window.fianzaValidationResult.porcentaje_similitud}% respecto al modelo del DOF. La afianzadora podría estar limitando su responsabilidad legal mediante modificaciones en la redacción.`,
                        icon: 'warning',
                        confirmButtonColor: '#f59e0b'
                    });
                }

                const modal = document.getElementById('modal-resumen-batch');
                if (modal) {
                    modal.classList.remove('hidden');
                    setTimeout(() => {
                        modal.classList.remove('opacity-0');
                        modal.querySelector('div').classList.remove('scale-95');
                        modal.querySelector('div').classList.add('scale-100');
                    }, 50);
                }
                if (typeof inicializarContratos === 'function') inicializarContratos();
            }, 500);

        } catch (error) {
            console.error("Error en Batch:", error);
            Swal.fire({
                title: 'Error de Procesamiento',
                text: error.message || "Ocurrió un error en la secuencia de importación.",
                icon: 'error',
                confirmButtonColor: '#611232'
            });
            if (btn) {
                btn.disabled = false;
                btn.innerHTML = `<svg class="w-5 h-5 mr-3 text-inst-oro animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg> Reintentar Procesamiento`;
            }
        }
    };

    /**
     * PROCESA UN PASO DEL BATCH SIN MODALES INTRUSIVOS
     */
    async function procesarPasoBatchInPlace(base64, mime, table, context = {}, retryCount = 0) {
        const MAX_RETRIES = 1; // Un reintento automático para timeouts
        return new Promise((resolve, reject) => {
            google.script.run
                .withSuccessHandler((response) => {
                    // --- LOG NAVEGADOR (ORQUESTADOR BATCH) ---
                    console.log("DEBUG_IA_BATCH_RESPONSE:", response);

                    if (response.error) {
                        // Si es un timeout y tenemos reintentos, lo lanzamos de nuevo con Flash
                        if (response.error.includes("timed out") && retryCount < MAX_RETRIES) {
                            console.warn("Timeout detectado, reintentando paso...");
                            resolve(procesarPasoBatchInPlace(base64, mime, table, context, retryCount + 1));
                        } else {
                            reject(new Error(response.error));
                        }
                    } else {
                        // Iniciar el guardado automático del resultado extraído
                        google.script.run
                            .withSuccessHandler((saveResponse) => {
                                if (saveResponse.error) reject(new Error(saveResponse.error));
                                else resolve({ datos: response.data.datos, ids: saveResponse.ids, fullResponse: response.data });
                            })
                            .withFailureHandler(reject)
                            .guardarDatosIA(response.data, table, context.ID_Contrato || null);
                    }
                })
                .withFailureHandler(async (err) => {
                    if (retryCount < MAX_RETRIES) {
                        console.warn("Falla de red, reintentando...");
                        resolve(procesarPasoBatchInPlace(base64, mime, table, context, retryCount + 1));
                    } else {
                        reject(err);
                    }
                })
                .procesarDocumentoConIA(base64, mime, table, JSON.stringify(context));
        });
    }

        }
    }

    function marcarSlotCompletado(id) {
        const slot = document.getElementById(`slot-${id}`);
        if (!slot) return;

        slot.classList.add('bg-emerald-50', 'border-emerald-200');

        }
        const statusText = slot.querySelector('span:last-child');
        if (statusText) {

    function handleBatchFiles(files) {
        mostrarContenedorSlots();
        const arr = Array.from(files);
        const identificationZone = document.getElementById('batch-identification-zone');
        if (identificationZone) {
            identificationZone.classList.remove('hidden');
            setTimeout(() => identificationZone.classList.remove('opacity-0'), 50);
        }

        arr.forEach(file => {
            const fileId = "file-" + Math.random().toString(36).substr(2, 9);
            renderIdentifyingItemInQueue(fileId, file.name);

            const reader = new FileReader();
            reader.onload = function (e) {
                const base64Data = e.target.result;
                let mimeType = file.type || 'application/pdf';
                
                // Forzar MIME type de Excel si es genérico
                const fileName = file.name.toLowerCase();
                if ((mimeType === 'application/octet-stream' || !mimeType) && (fileName.endsWith('.xlsx') || fileName.endsWith('.xls'))) {
                    mimeType = 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet';
                }

                google.script.run
                    .withSuccessHandler(function (res) {
                        removerItemDeColaIdentificacion(fileId);
                        if (res.success) {
                            const clase = res.clase;
                            let slotMapping = { 'Contratos': 1, 'CAF': 2, 'Programa': 3, 'Matriz_Insumos': 4, 'Fianza': 5 };
                            const finalSlot = slotMapping[clase] || [1, 2, 3, 4, 5].find(s => !window.batchQueueFiles[s]) || 1;

                            // Si ya hay algo en ese slot, buscar el siguiente disponible
                            let assignedSlot = finalSlot;
                            if (window.batchQueueFiles[assignedSlot]) {
                                assignedSlot = [1, 2, 3, 4, 5].find(s => !window.batchQueueFiles[s]) || assignedSlot;
                            }

                            window.batchQueueFiles[assignedSlot] = file;
                            renderFileInSlotBatch(assignedSlot, file);
                        } else {
                            fallbackIdentificationBatch(file, 1);
                        }
                        verificarIntegridadExpedienteBatch();
                    })
                    .withFailureHandler(function () {
                        removerItemDeColaIdentificacion(fileId);
                        fallbackIdentificationBatch(file, 1);
                        verificarIntegridadExpedienteBatch();
                    })
                    .clasificarDocumentoIA(base64Data, mimeType, file.name);
            };
            reader.readAsDataURL(file);
        });
    }

    function fallbackIdentificationBatch(file, suggestedSlot) {
        const name = file.name.toLowerCase();
        
        // Motor de evaluación por matriz de pesos para el Frontend (Nombres de Archivo)
        const huellas = {
            // Añadimos fragmentos de folios comunes (z-cf, lo-09) a la huella del contrato
            1: ['contrato', 'convenio_principal', 'relacionados_con_obra', 'z-cf', 'lo-09'], 
            2: ['caf', 'suficiencia', 'recurso', 'fonadin', 'apoyo_financiero'], 
            3: ['programa', 'calendario', 'trabajo', 'erogaciones'], 
            4: ['matriz', 'apu', 'unitario', 'insumo', 'e5', 'e7', 'anexo', 'catalogo', 'explosión', 'explosion'], 
            5: ['fianza', 'garant', 'poliza', 'afianzadora'] 
        };

        let target = 0;
        let puntajeMaximo = 0;

        for (const [slot, palabrasClave] of Object.entries(huellas)) {
            let puntosObtenidos = 0;
            palabrasClave.forEach(patron => {
                if (name.includes(patron)) puntosObtenidos++;
            });

            if (puntosObtenidos > puntajeMaximo) {
                puntajeMaximo = puntosObtenidos;
                target = parseInt(slot);
            }
        }

        // NUEVA REGLA: Si el nombre no tiene palabras clave pero tiene formato de folio institucional alfanumérico largo, asumimos que es el contrato
        if (target === 0 && /[0-9]+-[a-z]+-[a-z]+/i.test(name)) {
            target = 1;
        }

        // Si sigue sin coincidencias, buscar el primer slot vacío
        if (target === 0) {
            target = [1, 2, 3, 4, 5].find(s => !window.batchQueueFiles[s]) || suggestedSlot;
        } else {
            if (window.batchQueueFiles[target]) {
                const availableSlot = [1, 2, 3, 4, 5].find(s => !window.batchQueueFiles[s]);
                if (availableSlot) target = availableSlot; 
            }
        }

        window.batchQueueFiles[target] = file;
        renderFileInSlotBatch(target, file);
    }

            btnConfirm.innerText = "Actualizar Datos";
            btnConfirm.className = "bg-inst-vino hover:bg-inst-negro text-white px-8 py-2 rounded-[1.5rem] text-sm font-black uppercase tracking-wider shadow-lg shadow-inst-vino/20 transition-all";
            btnConfirm.onclick = function () {
                // Filtrar cambios aceptados
                const inputs = document.querySelectorAll('.input-cambio-ia');
                const idsAceptados = Array.from(inputs).filter(i => i.checked).map(i => parseInt(i.dataset.index));

                // Re-procesar datosCompletos para descartar lo NO seleccionado
                const cambiosRechazados = cambios.filter(c => !idsAceptados.includes(c.id_interno));

                // Si hay cambios rechazados, restaurar los valores originales en datosCompletos
                cambiosRechazados.forEach(c => {
                    const registroIA = datosCompletos[c.tabla].find(r =>
                        (c.tabla === 'Catalogo_Conceptos' && r.Clave === c.numContrato) ||
                        (r.Numero_Contrato === c.numContrato) ||
                        (r.Numero_Acuerdo === c.numContrato)
                    );
                    if (registroIA) {
                        // Restaurar el valor de la DB (ignoramos la sugerencia de la IA)
                        registroIA[c.campo] = (c.valorActual === "(Vacío)") ? null : c.valorActual;
                    }
                });

                cerrarModalAdvertenciaIA();
                ejecutarGuardadoIA(datosCompletos);
            };
        }

        document.getElementById('modal-advertencia-ia').classList.remove('hidden');
    }

    function ejecutarGuardadoIA(datos) {
        // Inyectar contexto de contrato si estamos en detalle
        if (window.idContratoActual) {
            datos.ID_Contrato_Contexto = window.idContratoActual;
        }
        // Preservar parentContext si no venía en los datos
        if (!datos.parentContext) {
            datos.parentContext = {
                ID_Contrato: window.idContratoActual || null,
                ID_Concepto: window.idConceptoMatrizActual || null
            };
        }

        // Si el modal de importación sigue abierto, actualizar status allí
        const modalIA = document.getElementById('modal-importacion-ia');
        if (modalIA && !modalIA.classList.contains('hidden')) {
            updateAIStatus(true, "Guardando Datos...", "Sincronizando Catálogo y Matrices con la base de datos");
        } else {
            toggleSpinner(true, "Guardando información en la base de datos...");
        }

        google.script.run
            .withSuccessHandler(function (res) {
                toggleSpinner(false);
                if (res && res.success) {
                    if (modalIA && !modalIA.classList.contains('hidden')) {
                        updateAIStatus(true, "¡Éxito!", "Importación completada correctamente");
                        setTimeout(() => cerrarModalImportacionIA(), 2000);
                        // Si estamos en la vista de importación maestra, actualizar el wizard
                        if (window.view_active === 'importacion_maestra.vw') {
                            const tipoImportacion = document.getElementById('import-type-actual') ? document.getElementById('import-type-actual').value : null;
                            if (tipoImportacion) {
                                let stepNum = 0;
                                if (tipoImportacion === 'Contratos') stepNum = 1;
                                else if (tipoImportacion === 'CAF') stepNum = 2;
                                else if (tipoImportacion === 'Programa') stepNum = 3;
                                else if (tipoImportacion === 'Matriz_Insumos') stepNum = 4;

                                if (stepNum > 0 && !window.wizardStateIA.completed.includes(stepNum)) {
                                    window.wizardStateIA.completed.push(stepNum);
                                    if (window.wizardStateIA.step === stepNum) {
                                        window.wizardStateIA.step = stepNum + 1;
                                    }
                                }
                                if (typeof window.actualizarWizardSequencial === 'function') {
                                    window.actualizarWizardSequencial();
                                }
                            }
                        }
                    } else {
                        notificarExito("Importación exitosa.");
                    }

                    // Notificar resumen
                    const msg = `IA: ${res.message}\n\nEfectuados: ${res.detalles.insertados} inserciones y ${res.detalles.actualizados} actualizaciones.`;
                    Swal.fire({
                        title: 'Procesamiento IA Finalizado',
                        text: msg,
                        icon: 'success',
                        confirmButtonColor: '#2563eb'
                    });

                    if (typeof inicializarContratos === 'function') inicializarContratos();
                    // Si estamos en detalle de contrato, recargar los conceptos y el programa
                    const idContratoRefresh = window.idContratoActual || (window.vistaActualParams ? window.vistaActualParams.id : null);
                    if (idContratoRefresh && typeof window.inicializarContratoDetalle === 'function') {
                        console.log("IA_REFRESH: Disparando recarga de detalle para id:", idContratoRefresh);
                        window.inicializarContratoDetalle({ id: idContratoRefresh });
                        // Refuerzo específico para el programa si estamos en esa vista
                        if (typeof window.generarPeriodosPrograma === 'function') {
                            window.generarPeriodosPrograma();
                        }
                    }
                } else {
                    manejarError(res || { success: false, error: "Error en el guardado IA", functionName: "guardarDatosIA" });
                }
            })
            .withFailureHandler(function (err) {
                toggleSpinner(false);
                manejarError({ error: err.message, functionName: 'guardarDatosIA' });
            })
            .guardarDatosIA(datos);
    }
    /**

        // google.script.run ya nos dio los conceptos.

    /**
     * Renderiza los insumos en la tabla del modal agrupados y con pie de sobrecostos.
     */
    function renderizarMatrizInsumos(data) {
        const tbody = document.getElementById('tabla-matriz-body');
        const countLbl = document.getElementById('txt-matriz-count');
        const cdLbl = document.getElementById('txt-matriz-cd');
        const puLbl = document.getElementById('txt-matriz-pu');
        const fsLbl = document.getElementById('txt-matriz-fs');

        const insumos = data.insumos || [];
        const contrato = data.contrato || {};

        if (!insumos || insumos.length === 0) {
            tbody.innerHTML = `<tr><td colspan="7" class="px-2 py-8 text-sm text-center text-slate-400 italic">No hay insumos registrados para este concepto. Utiliza el importador IA para cargar la matriz.</td></tr>`;
            countLbl.innerText = "0";
            return;
        }

        countLbl.innerText = insumos.length;
        const formatM = (v) => new Intl.NumberFormat('es-MX', { style: 'currency', currency: 'MXN' }).format(v || 0);

        // --- AGRUPACIÓN ---
        const grupos = {
            1: { nombre: 'MATERIALES', icon: '📦', color: 'blue', items: [], total: 0 },
            2: { nombre: 'MANO DE OBRA', icon: '👷', color: 'amber', items: [], total: 0 },
            3: { nombre: 'MAQUINARIA Y EQUIPO', icon: '🚜', color: 'purple', items: [], total: 0 },
            4: { nombre: 'HERRAMIENTA Y OTROS', icon: '🛠️', color: 'emerald', items: [], total: 0 }
        };

        insumos.forEach(ins => {
            const t = parseInt(ins.Tipo_Insumo) || 1;
            const target = grupos[t] || grupos[4];
            target.items.push(ins);
            target.total += (parseFloat(ins.Importe) || 0);
        });

        let totalDirecto = 0;
        let html = '';

        Object.keys(grupos).forEach(k => {
            const g = grupos[k];
            if (g.items.length === 0) return;

            totalDirecto += g.total;
            const idGrupo = `grupo-matriz-${k}`;

            // Header del Grupo
            html += `
                <tr class="bg-slate-50 cursor-pointer group hover:bg-slate-100 transition-colors" onclick="toggleGrupoMatriz('${idGrupo}')">
                    <td colspan="6" class="px-2 py-1 text-sm font-black text-slate-500 uppercase tracking-wider">
                        <div class="flex items-center">
                            <span class="mr-2 transform transition-transform group-collapsed:rotate-0 rotate-90" id="icon-${idGrupo}">▼</span>
                            <span>${g.icon} ${g.nombre}</span>
                        </div>
                    </td>
                    <td class="px-2 py-1 text-right text-sm font-black text-slate-700 bg-slate-100/50">${formatM(g.total)}</td>
                </tr>
            `;

            // Filas del Grupo
            g.items.forEach(ins => {
                html += `
                    <tr class="${idGrupo} hover:bg-blue-50/30 border-b border-slate-100 transition-colors">
                        <td class="px-2 py-1">
                            <span class="px-1 py-0.5 rounded text-sm font-black uppercase tracking-tighter ${getClaseTipoInsumo(ins.Tipo_Insumo)}">${ins.Tipo_Insumo || 'INSUMO'}</span>
                        </td>
                        <td class="px-2 py-1 text-sm font-bold text-slate-700">${ins.Clave_Insumo || '-'}</td>
                        <td class="px-2 py-1 text-sm text-slate-600 leading-tight">${ins.Descripcion || ''}</td>
                        <td class="px-2 py-1 text-sm text-center text-slate-500 font-medium">${ins.Unidad || ''}</td>
                        <td class="px-2 py-1 text-sm text-right font-mono text-slate-600">${parseFloat(ins.Rendimiento_Cantidad || 0).toFixed(6)}</td>
                        <td class="px-2 py-1 text-sm text-right font-mono text-slate-600">${formatM(ins.Costo_Unitario)}</td>
                        <td class="px-2 py-1 text-sm text-right font-mono font-black text-slate-700">${formatM(ins.Importe)}</td>
                    </tr>
                `;
            });
        });

        // --- FOOTER DE SOBRECOSTOS ---
        const cd = totalDirecto;

        // El total es el prioritario/obligatorio según el usuario
        let pctIndTotal = parseFloat(contrato.Pct_Indirectos_Totales) || 0;
        const ci_of = (parseFloat(contrato.Pct_Indirectos_Oficina) || 0) / 100;
        const ci_ca = (parseFloat(contrato.Pct_Indirectos_Campo) || 0) / 100;

        // Si el total no está definido en el contrato, usamos la suma de oficina + campo
        if (pctIndTotal === 0) {
            pctIndTotal = (ci_of + ci_ca) * 100;
        }

        const pct_ind_calc = pctIndTotal / 100;
        const cf_pct = (parseFloat(contrato.Pct_Financiamiento) || 0) / 100;
        const cu_pct = (parseFloat(contrato.Pct_Utilidad) || 0) / 100;
        const isn_pct = (parseFloat(contrato.Pct_ISN) || 0) / 100;
        const sfp_pct = 0.005025; // Equivale al 5 al millar (0.5% / 0.995)

        const m_ci_total = cd * pct_ind_calc;
        const sub1 = cd + m_ci_total;

        const m_cf = sub1 * cf_pct;
        const sub2 = sub1 + m_cf;

        const m_cu = sub2 * cu_pct;
        const sub3 = sub2 + m_cu;

        const m_sfp = sub3 * sfp_pct;
        const m_isn = cd * isn_pct;
        const pu_final = sub3 + m_sfp + m_isn;

        html += `
            <tr class="bg-slate-900 text-white font-black">
                <td colspan="6" class="px-2 py-2 text-right uppercase tracking-wider text-sm">Costo Directo Total (CD)</td>
                <td class="px-2 py-2 text-right font-mono text-sm">${formatM(cd)}</td>
            </tr>
            <tr class="bg-slate-50 text-slate-600 border-t-2 border-slate-200">
                <td colspan="6" class="px-2 py-1 text-right text-sm font-bold uppercase">Costos Indirectos Totales (${pctIndTotal.toFixed(2)}%)</td>
                <td class="px-2 py-1 text-right font-mono text-sm">${formatM(m_ci_total)}</td>
            </tr>
            <tr class="bg-slate-100 text-slate-700">
                <td colspan="6" class="px-2 py-1 text-right text-sm font-black uppercase">Subtotal (CD + Indirectos)</td>
                <td class="px-2 py-1 text-right font-mono text-sm font-black">${formatM(sub1)}</td>
            </tr>
            <tr class="bg-white text-slate-600">
                <td colspan="6" class="px-2 py-1 text-right text-sm font-bold uppercase">Costo Financiero (${(cf_pct * 100).toFixed(4)}%)</td>
                <td class="px-2 py-1 text-right font-mono text-sm">${formatM(m_cf)}</td>
            </tr>
            <tr class="bg-slate-100 text-slate-700">
                <td colspan="6" class="px-2 py-1 text-right text-sm font-black uppercase">Subtotal (Financiamiento)</td>
                <td class="px-2 py-1 text-right font-mono text-sm font-black">${formatM(sub2)}</td>
            </tr>
            <tr class="bg-white text-slate-600">
                <td colspan="6" class="px-2 py-1 text-right text-sm font-bold uppercase">Utilidad (${(cu_pct * 100).toFixed(2)}%)</td>
                <td class="px-2 py-1 text-right font-mono text-sm">${formatM(m_cu)}</td>
            </tr>
            <tr class="bg-slate-100 text-slate-700">
                <td colspan="6" class="px-2 py-1 text-right text-sm font-black uppercase">Subtotal (Utilidad)</td>
                <td class="px-2 py-1 text-right font-mono text-sm font-black">${formatM(sub3)}</td>
            </tr>
            <tr class="bg-amber-50 text-amber-900">
                <td colspan="6" class="px-2 py-1 text-right text-sm font-bold uppercase italic">Cargos Adicionales (5 al Millar / SFUPU)</td>
                <td class="px-2 py-1 text-right font-mono text-sm">${formatM(m_sfp)}</td>
            </tr>
            <tr class="bg-amber-50 text-amber-900 border-b-2 border-white">
                <td colspan="6" class="px-2 py-1 text-right text-sm font-bold uppercase italic">Impuesto sobre Nómina (${(isn_pct * 100).toFixed(2)}%)</td>
                <td class="px-2 py-1 text-right font-mono text-sm">${formatM(m_isn)}</td>
            </tr>
            <tr class="bg-blue-600 text-white font-black">
                <td colspan="6" class="px-2 py-2 text-right uppercase tracking-wider text-sm">Precio Unitario Final (Total de Matriz)</td>
                <td class="px-2 py-2 text-right font-mono text-sm underline decoration-double">${formatM(pu_final)}</td>
            </tr>
        `;

        tbody.innerHTML = html;
        cdLbl.innerText = formatM(totalDirecto);

        // Calcular Factor de Sobrecosto Total
        if (totalDirecto > 0) {
            fsLbl.innerText = (pu_final / totalDirecto).toFixed(4);
        } else {
            fsLbl.innerText = "1.0000";
        }

        puLbl.innerText = formatM(pu_final);
    }

    function getClaseTipoInsumo(tipo) {
        const t = String(tipo || '').toUpperCase();
        if (t === '1' || t.includes('MATERIAL')) return 'bg-blue-50 text-blue-600 border border-blue-100';
        if (t === '2' || t.includes('MANO')) return 'bg-amber-50 text-amber-600 border border-amber-100';
        if (t === '3' || t.includes('EQUIPO')) return 'bg-purple-50 text-purple-600 border border-purple-100';
        if (t.includes('HERRAMIENTA')) return 'bg-emerald-50 text-emerald-600 border border-emerald-100';
        return 'bg-slate-50 text-slate-500 border border-slate-100';
    }

    /**

     */
    window.cambiarEstadoAprobacionManual = function (checkbox) {
        const isApproved = checkbox.checked;
        const statusLabel = document.getElementById('lbl-status-switch');
        const approvedLabel = document.getElementById('lbl-status-approved');

        if (isApproved) {
            statusLabel.classList.add('hidden');
            approvedLabel.classList.remove('hidden');
            
            // WOW Effect: SweetAlert Toast de éxito
            const Toast = Swal.mixin({
                toast: true,
                position: 'top-end',
                showConfirmButton: false,
                timer: 3000,
                timerProgressBar: true,
                didOpen: (toast) => {
                    toast.addEventListener('mouseenter', Swal.stopTimer)
                    toast.addEventListener('mouseleave', Swal.resumeTimer)
                }
            });

            Toast.fire({
                icon: 'success',
                title: 'Contrato Validado',
                text: 'El dictamen ha sido aprobado exitosamente.'
            });
        } else {
            statusLabel.classList.remove('hidden');
            approvedLabel.classList.add('hidden');
        }

        // Actualizar visibilidad de la sección de facturas timbradas
        const seccionFactura = document.getElementById('seccion-carga-factura-timbrada');
        if (seccionFactura) {
            if (isApproved) {
                seccionFactura.classList.remove('hidden', 'animate-in', 'fade-in', 'slide-in-from-top-4');
                void seccionFactura.offsetWidth; // Trigger reflow
                seccionFactura.classList.add('animate-in', 'fade-in', 'slide-in-from-top-4', 'duration-500');
            } else {
                seccionFactura.classList.add('hidden');
            }
        }
    };

    window.renderizarChecklistAuditoria = function (checklist) {
        const container = document.getElementById('checklist-auditoria-container');
        if (!container || !checklist) return;

        if (checklist.length === 0) {
            container.innerHTML = `
                <div class="flex items-center gap-3 py-1">
                    <div class="w-5 h-5 bg-slate-100 rounded-full flex items-center justify-center shrink-0">
                        <svg class="w-3 h-3 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>

            const icon = isOk ?
                '<svg class="w-2.5 h-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M5 13l4 4L19 7"></path></svg>' :

            const badgeColor = isOk ? 'bg-emerald-500' : 'bg-rose-500';

            return `
                <div class="flex items-start gap-4 p-3 rounded-2xl border transition-all hover:shadow-sm animate-in fade-in slide-in-from-right-2 duration-300" 
                     style="animation-delay: ${index * 50}ms; ${isOk ? 'border-color: #d1fae5;' : 'border-color: #fee2e2;'}">
                    <div class="w-6 h-6 ${badgeColor} rounded-lg flex items-center justify-center shrink-0 text-white shadow-sm mt-0.5">

                    </div>

                    </div>
                </div>
            `;
        }).join('');

        // Auto-switch si todo está aprobado (100%)
        const totalItems = checklist.length;
        const totalAprobados = checklist.filter(i => i.aprobado).length;
        const sw = document.getElementById('switch-estado-aprobacion');

        if (sw) {
            if (totalAprobados === totalItems && totalItems > 0) {
                sw.checked = true;
                window.cambiarEstadoAprobacionManual(sw);
            } else {
                // Si algo falló o falta, asegurar que no esté aprobado
                sw.checked = false;
                window.cambiarEstadoAprobacionManual(sw);
            }
        }
    };

    /**
     * Carga el historial de estimaciones del contrato actual.
     */
    window.cargarEstimacionesContrato = function () {
        const container = document.getElementById('container-lista-estimaciones');
        if (!container) return;
        container.innerHTML = `<div class="col-span-full py-20 text-center text-slate-400 italic animate-pulse">Sincronizando estado financiero...</div>`;

        google.script.run
            .withSuccessHandler(function (response) {
                if (response.success) {
                    renderizarListaEstimaciones(response.data);

                    // Calcular KPIs de la pestaña
                    const totalContrato = window.contratoActual ? parseFloat(window.contratoActual.Monto_Total_Sin_IVA) || 0 : 0;
                    const acumuladoSinIva = response.data.reduce((acc, est) => acc + (parseFloat(est.Monto_Sin_IVA) || 0), 0);
                    const avancePct = totalContrato > 0 ? (acumuladoSinIva / totalContrato) * 100 : 0;
                    const saldo = totalContrato - acumuladoSinIva;

                    const formatM = (v) => new Intl.NumberFormat('es-MX', { style: 'currency', currency: 'MXN' }).format(v || 0);

                    if (document.getElementById('lbl-total-estimado-kpi')) document.getElementById('lbl-total-estimado-kpi').innerText = formatM(acumuladoSinIva);

    /**
     * Renderiza la carátula y la tabla de conceptos ejecutados.
     */
    function renderizarDetalleEstimacion(data) {
        const est = data.estimacion;
        const cont = data.contrato;
        const conceptos = data.conceptos || [];

        window.idEstimacionActual = est.ID_Estimacion;
        window.noEstimacionActual = est.No_Estimacion;
        window.objetoContratoActual = cont.Objeto_Contrato;
        window.montoTotalContratoActual = parseFloat(cont.Monto_Total_Sin_IVA) || 1;

        // 1. Mostrar contenedor y ocultar lista
        document.getElementById('container-lista-estimaciones').classList.add('hidden');
        document.getElementById('container-detalle-estimacion').classList.remove('hidden');

        // 2. Cabecera Carátula
        document.getElementById('lbl-detalle-no-est').innerText = est.No_Estimacion;
        document.getElementById('lbl-detalle-periodo-texto').innerText = `Periodo: ${est.Periodo_Inicio} al ${est.Periodo_Fin}`;

        // 3. Datos Oficiales
        document.getElementById('lbl-caratula-num-contrato').innerText = cont.Numero_Contrato || '---';
        document.getElementById('lbl-caratula-contratista').innerText = cont.Nombre_Contratista || '---';
        document.getElementById('lbl-caratula-objeto').innerText = cont.Objeto_Contrato || '---';

        // 4. Tabla de Conceptos
        renderizarTablaConceptosEstimacion(conceptos);

        // 5. Totales
        recalcularTotalesCaratula();

        // 6. Reset estado del botón de guardado
        const btnGuardar = document.getElementById('btn-guardar-detalles-estimacion');
        if (btnGuardar) btnGuardar.disabled = true;

        // 7. Reset Checklist y Switch de Estado
        if (document.getElementById('checklist-auditoria-container')) {
            document.getElementById('checklist-auditoria-container').innerHTML = `
                <div class="bg-white border border-slate-200 rounded-xl px-4 py-2 flex items-center shadow-sm opacity-50 italic text-xs text-slate-400">
                    Esperando auditoría...
                </div>
            `;
        }
        const sw = document.getElementById('switch-estado-aprobacion');
        if (sw) {
            sw.checked = (est.Estado_Validacion === 'APROBADA');
            window.cambiarEstadoAprobacionManual(sw);
        }

        // 8. Cargar validaciones persistidas desde Validacion_Archivos
        if (est.ID_Estimacion) {
            google.script.run
                .withSuccessHandler(function (resVal) {
                    if (resVal && resVal.success && resVal.data.length > 0) {
                        // Tomar la validación más reciente
                        const ultimaVal = resVal.data[resVal.data.length - 1];
                        if (ultimaVal.Checklist && ultimaVal.Checklist.length > 0) {
                            window.renderizarChecklistAuditoria(ultimaVal.Checklist);
                        }
                    }
                })
                .getValidacionesEstimacion(est.ID_Estimacion);
        }
    }

    /**
     * Calcula los montos de la carátula en tiempo real basado en los inputs.
     */
    window.recalcularTotalesCaratula = function () {
        const inputs = document.querySelectorAll('.input-cantidad-est');

        let totalBrutoActual = 0;
        let totalBrutoAnt = 0;
        const montoTotalC = window.montoTotalContratoActual || 1;

        inputs.forEach(input => {
            const cantActual = parseFloat(input.value) || 0;
            const cantAnt = parseFloat(input.dataset.cantAnt) || 0;
            const pu = parseFloat(input.dataset.pu) || 0;

            const importeActual = cantActual * pu;
            const importeAnt = cantAnt * pu;
            const importeAcum = importeActual + importeAnt;

            totalBrutoActual += importeActual;
            totalBrutoAnt += importeAnt;

            const tr = input.closest('tr');
            if (tr.querySelector('.val-importe-est')) tr.querySelector('.val-importe-est').innerText = formatoMoneda(importeActual);
            if (tr.querySelector('.val-imp-acumulado-est')) tr.querySelector('.val-imp-acumulado-est').innerText = formatoMoneda(importeAcum);

            const pctAcum = (importeAcum / montoTotalC) * 100;
            if (tr.querySelector('.val-pct-acumulado-est')) tr.querySelector('.val-pct-acumulado-est').innerText = pctAcum.toFixed(4) + '%';
        });

        const totalBrutoAcum = totalBrutoAnt + totalBrutoActual;
        const iva = totalBrutoActual * 0.16;
        const totalConIva = totalBrutoActual + iva;
        const sfp = totalBrutoActual * 0.005;
        const alcanceLiquido = totalConIva - sfp;

        // Porcentajes Globales
        const pctEstePeriodo = (totalBrutoActual / montoTotalC) * 100;
        const pctAcumulado = (totalBrutoAcum / montoTotalC) * 100;

        // Actualizar UI Carátula (Nuevos IDs y Antiguos)
        const updateText = (id, val) => { const el = document.getElementById(id); if (el) el.innerText = val; };
        
        updateText('lbl-caratula-bruto', formatoMoneda(totalBrutoActual));
        updateText('val-caratula-bruto', formatoMoneda(totalBrutoActual));
        updateText('val-caratula-iva', formatoMoneda(iva));
        updateText('val-caratula-sfp', formatoMoneda(sfp));
        updateText('val-caratula-neto', formatoMoneda(alcanceLiquido));
        updateText('lbl-total-detalle-sin-iva', formatoMoneda(totalBrutoActual));

        if (document.getElementById('lbl-caratula-monto-letra')) {
            const montoLetra = convertirNumeroALetras(alcanceLiquido);
            document.getElementById('lbl-caratula-monto-letra').innerText = `SON: (${montoLetra})`;
        }

        updateText('lbl-caratula-pct-avance', pctEstePeriodo.toFixed(2) + '%');
        const bar = document.getElementById('bar-caratula-avance');
        if (bar) bar.style.width = Math.min(pctEstePeriodo, 100).toFixed(2) + '%';

        updateText('lbl-caratula-avance-acum', pctAcumulado.toFixed(2) + '%');
    };

    /**
     * Verifica si hay algún cambio en las cantidades para activar el botón Guardar.
     */
    window.verificarCambiosEstimacion = function () {
        const inputs = document.querySelectorAll('.input-cantidad-est');
        const btnGuardar = document.getElementById('btn-guardar-detalles-estimacion');
        let hayCambios = false;

        inputs.forEach(input => {
            const orgVal = parseFloat(input.dataset.original) || 0;
            const curVal = parseFloat(input.value) || 0;
            if (Math.abs(orgVal - curVal) > 0.0001) {
                hayCambios = true;
            }
        });

        if (btnGuardar) {
            btnGuardar.disabled = !hayCambios;
        }
    };

        document.getElementById('container-detalle-estimacion').classList.add('hidden');
        document.getElementById('container-lista-estimaciones').classList.remove('hidden');
        window.idEstimacionActual = null;
    };

    /**
     * Envía los datos capturados al servidor para persistencia.

    window.guardarDetalleEstimacion = function () {
        if (!window.idEstimacionActual) return;

        const inputs = document.querySelectorAll('.input-cantidad-est');
        const items = [];

        inputs.forEach(input => {
            items.push({
                ID_Concepto: input.closest('tr').dataset.idConcepto,
                Cantidad_Estimada_Periodo: parseFloat(input.value) || 0
            });
        });

        toggleSpinner(true, "Guardando avances y calculando retenciones...");

        google.script.run
            .withSuccessHandler(function (response) {
                toggleSpinner(false);
                if (response.success) {
                    Swal.fire({
                        icon: 'success',
                        title: 'Estimación Guardada',
                        text: 'Los avances y deducciones se han registrado exitosamente.',
                        confirmButtonColor: '#059669',
                        customClass: { popup: 'rounded-[2rem]' }
                    });
                    cargarEstimacionesContrato();
                    cerrarDetalleEstimacion();

        }

        }

    /**
     * Lógica compartida para leer y preparar el archivo.
     */
    function procesarArchivoFianza(file) {
        if (!file.type.match('application/pdf') && !file.type.match('image.*')) {
            Swal.fire('Formato no válido', 'Solo se aceptan archivos PDF o imágenes.', 'error');
            return;
        }

        const reader = new FileReader();
        const fileNameEl = document.getElementById('fianza-file-name');

        fileNameEl.innerText = `ARCHIVO: ${file.name}`;
        fileNameEl.classList.remove('hidden');

        reader.onload = function (e) {
            window.fianzaFileBase64 = e.target.result;
            window.fianzaFileMimeType = file.type;

            // Si la acción es validar, iniciar automáticamente para una experiencia premium
            const accion = document.getElementById('fianza-accion-select').value;
            if (accion === 'validar') {
                ejecutarAccionFianza();
            } else {
                Swal.fire({
                    icon: 'info',
                    title: 'Archivo cargado',
                    text: 'Se ha cargado el borrador. Haz clic en "Ejecutar Acción" para analizar.',
                    timer: 2000,
                    showConfirmButton: false,
                    customClass: { popup: 'rounded-[2rem]' }
                });
            }
        };
        reader.readAsDataURL(file);
    }

    /**
     * Ejecuta la acción seleccionada (Borrador o Validación).
     */
    window.ejecutarAccionFianza = function () {
        const accion = document.getElementById('fianza-accion-select').value;
        const tipo = document.getElementById('fianza-tipo-select').value;
        const idContrato = window.idContratoActual;

        if (!idContrato) {
            Swal.fire('Error', 'No se ha identificado el contrato actual.', 'error');
            return;
        }

        // Si es borrador y no hay archivo, registramos directo sin IA
        const hasFile = !!window.fianzaFileBase64;
        if (accion === 'borrador' && !hasFile) {
            registrarFianzaBorrador(idContrato, tipo);
            return;
        }

        // De lo contrario, validamos contra el modelo DOF
        validarFianzaConIA(idContrato, tipo, accion);
    };

    /**
     * Registra el estatus de la fianza como BORRADOR.
     */
    function registrarFianzaBorrador(idContrato, tipo) {
        if (!idContrato) {
            Swal.fire('Error', 'No se ha identificado el contrato.', 'error');
            return;
        }
        toggleSpinner(true, "Registrando borrador...");

        google.script.run
            .withSuccessHandler(function (res) {
                toggleSpinner(false);
                if (res.success) {
                    Swal.fire('Estatus Actualizado', `La fianza de ${tipo} ha sido marcada como BORRADOR.`, 'success');
                    cerrarModalFianza();
                    // Refrescar labels
                    if (window.vistaActualParams) inicializarContratoDetalle(window.vistaActualParams);
                } else {
                    manejarError(res);
                }
            })
            .withFailureHandler(function (err) {
                toggleSpinner(false);
                manejarError({ error: err.message, functionName: 'registrarFianzaBorrador' });
            })
            .actualizarEstatusFianzaBorrador(idContrato, tipo);
    }

    /**
     * Envía el documento a la IA para validación conforme a modelos DOF.
     */
    function validarFianzaConIA(idContrato, tipo, accion = 'validar') {
        const hasFile = !!window.fianzaFileBase64;
        const msg = hasFile ? "Analizando Póliza con Gemini 1.5 Pro..." : "Validando Contexto del Contrato vs Modelo DOF...";

        toggleSpinner(true, msg);

        const contrato = window.contratoActual || {};
        const montoBase = parseFloat(contrato.Monto_Total_Sin_IVA) || 0;
        const tipoContratoStr = (contrato.Tipo_Contrato || '').toUpperCase();

        // Determinar Ley Aplicable
        let leyAplicable = 'LAASSP (Adquisiciones)';
        if (tipoContratoStr.includes('OBRA') || tipoContratoStr.includes('RELACIONADOS')) {
            leyAplicable = 'LOPSRM (Obras Públicas)';
        }

        let montoEsperado = 0;
        let pctEsperado = 0;
        if (tipo === 'Cumplimiento') {
            pctEsperado = parseFloat(contrato.pct_Cumplimiento) || 10;
            montoEsperado = montoBase * (pctEsperado / 100);
        } else if (tipo === 'Anticipo') {
            pctEsperado = parseFloat(contrato.pct_Anticipo) || 0;
            montoEsperado = parseFloat(contrato.Monto_Fianza_Anticipo) || (montoBase * (pctEsperado / 100));
        } else if (tipo === 'Vicios Ocultos') {
            pctEsperado = parseFloat(contrato.pct_Vicios_Ocultos) || 10;
            montoEsperado = montoBase * (pctEsperado / 100);
        }

        const context = {
            ID_Contrato: idContrato,
            Tipo_Garantia: tipo,
            Ley_Aplicable: leyAplicable,
            Es_Borrador: accion === 'borrador',
            Monto_Contrato_Sin_IVA: montoBase,
            Monto_Esperado_Garantia: montoEsperado,
            Datos_Suelo: contrato
        };

        google.script.run
            .withSuccessHandler(function (res) {
                toggleSpinner(false);
                if (res.success && res.data) {
                    renderizarResultadoFianzaIA(res.data);

                    const val = res.data.validacion || {};
                    const esValida = val.estatus === 'VALIDA';

                    if (esValida) {
                        Swal.fire({
                            icon: 'success',
                            title: accion === 'borrador' ? '¡Contexto Validado!' : '¡Fianza Válida!',
                            text: accion === 'borrador' ?
                                'Los datos del contrato cumplen con el modelo. Puedes proceder con la fianza.' :
                                'La póliza coincide perfectamente con el modelo oficial.',
                            confirmButtonColor: '#059669'
                        });
                    } else {
                        Swal.fire({
                            icon: 'warning',
                            title: 'Discrepancias en el Análisis',
                            text: 'Se han detectado irregularidades respecto al modelo oficial del DOF.',
                            confirmButtonColor: '#e11d48'
                        });
                    }
                    // Guardar resultado para uso posterior (siempre, para permitir Omitir/Forzar)
                    window.ultimoResultadoFianzaIA = { idContrato, tipo, data: res.data, accion };
                } else {
                    manejarError(res);
                }
            })
            .withFailureHandler(function (err) {
                toggleSpinner(false);
                manejarError({ error: err.message, functionName: 'validarFianzaConIA' });
            })
            .processDocumentWithAI(window.fianzaFileBase64, window.fianzaFileMimeType, 'Fianza', JSON.stringify(context));
    }

    /**
     * Muestra visualmente el resultado de la validación IA en el modal.
     */
    function renderizarResultadoFianzaIA(data) {
        const container = document.getElementById('fianza-resultado-ia');
        const statusBadge = document.getElementById('fianza-status-badge');
        const statusIcon = document.getElementById('fianza-status-icon');
        const statusText = document.getElementById('fianza-status-text');
        const btnAplicar = document.getElementById('btn-aplicar-fianza');
        const btnEjecutar = document.getElementById('btn-ejecutar-fianza');
        const btnOmitir = document.getElementById('btn-omitir-fianza');
        const containerErrores = document.getElementById('fianza-errores-container');
        const listaErrores = document.getElementById('fianza-lista-errores');

        const resumenContainer = document.getElementById('fianza-resumen-container');
        const resumenTexto = document.getElementById('fianza-resumen-texto');
        const checklistContainer = document.getElementById('fianza-checklist-container');
        const checklistGrid = document.getElementById('fianza-checklist-grid');

        const val = data.validacion || {};
        const esValida = val.estatus === 'VALIDA';

        // Ocultar zona de carga para maximizar espacio de resultados
        const uploadArea = document.getElementById('fianza-upload-area');
        if (uploadArea) uploadArea.classList.add('hidden');

        container.classList.remove('hidden');

        // 0. Datos Extraídos
        const extracted = data.datos_extraidos || {};
        const containerExt = document.getElementById('fianza-datos-extraidos');
        if (containerExt && extracted.num_fianza) {
            containerExt.classList.remove('hidden');
            document.getElementById('fianza-ia-numero').innerText = extracted.num_fianza;
            document.getElementById('fianza-ia-monto').innerText = formatoMoneda(extracted.monto_documento);
            document.getElementById('fianza-ia-afianzadora').innerText = extracted.nombre_afianzadora || 'NO DETECTADA';
            
            const pctIA = extracted.pct_fianza_documento;
            const pctLabel = document.getElementById('fianza-ia-pct');
            if (pctLabel) {
                pctLabel.innerText = pctIA ? pctIA.toFixed(2) + '%' : '---';
            }
        } else if (containerExt) {
            containerExt.classList.add('hidden');
        }

        // 1. Estatus General
        if (esValida) {
            statusBadge.className = "p-4 rounded-2xl flex items-center justify-between border border-emerald-100 bg-emerald-50";
            statusIcon.className = "w-10 h-10 rounded-xl flex items-center justify-center bg-emerald-500 text-white";
            statusIcon.innerHTML = '<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>';
            statusText.innerText = "Cumple Modelo DOF";
            statusText.className = "text-sm font-black uppercase tracking-widest text-emerald-700";
            if (btnAplicar) btnAplicar.classList.remove('hidden');
            if (btnEjecutar) btnEjecutar.classList.add('hidden');
            if (btnOmitir) btnOmitir.classList.add('hidden');
        } else {
            statusBadge.className = "p-4 rounded-2xl flex items-center justify-between border border-rose-100 bg-rose-50";
            statusIcon.className = "w-10 h-10 rounded-xl flex items-center justify-center bg-rose-500 text-white";
            statusIcon.innerHTML = '<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>';
            statusText.innerText = "Discrepancias";
            statusText.className = "text-sm font-black uppercase tracking-widest text-rose-700";
            if (btnAplicar) btnAplicar.classList.add('hidden');
            if (btnEjecutar) btnEjecutar.classList.remove('hidden');
            if (btnOmitir) btnOmitir.classList.remove('hidden');
        }

        document.getElementById('fianza-confianza-text').innerText = data.tipo_identificado || 'Análisis Técnico';

        // 2. Resumen Crítico
        if (val.resumen_critico) {
            resumenContainer.classList.remove('hidden');
            resumenTexto.innerText = val.resumen_critico;
        } else {
            resumenContainer.classList.add('hidden');
        }

        // 3. Checklist
        if (val.checklist && val.checklist.length > 0) {
            checklistContainer.classList.remove('hidden');
            checklistGrid.innerHTML = val.checklist.map(item => `
                <div class="flex items-center gap-3 p-3 rounded-xl ${item.pasa ? 'bg-emerald-50/50' : 'bg-rose-50/50'} border ${item.pasa ? 'border-emerald-100' : 'border-rose-100'}">
                    <div class="w-5 h-5 rounded-full flex items-center justify-center ${item.pasa ? 'bg-emerald-500' : 'bg-rose-500'} text-white">
                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            ${item.pasa ?
                    '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path>' :
                    '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path>'}
                        </svg>
                    </div>
                    <div>
                        <p class="text-[11px] font-black uppercase tracking-tighter ${item.pasa ? 'text-emerald-700' : 'text-rose-700'}">${item.criterio}</p>
                        <p class="text-[10px] font-bold text-slate-500">${item.observacion}</p>
                    </div>
                </div>
            `).join('');
        } else {
            checklistContainer.classList.add('hidden');
        }

        // 4. Errores/Diferencias (Solo si no es válida)
        if (!esValida && val.checklist && val.checklist.some(i => !i.pasa)) {
            containerErrores.classList.remove('hidden');
            const fallos = val.checklist.filter(i => !i.pasa);
            listaErrores.innerHTML = fallos.map(f => `<li>${f.criterio}: ${f.observacion}</li>`).join('');
        } else {
            containerErrores.classList.add('hidden');
        }

        // Ocultar medidor de similitud viejo ya que ahora usamos checklist
        document.getElementById('fianza-similitud-pct').parentElement.classList.add('hidden');
    }

    /**
     * Persiste los datos de la fianza validados por la IA tras aprobación del usuario.
     */
    window.guardarFianzaValidada = function() {
        const resIA = window.ultimoResultadoFianzaIA;
        if (!resIA) return;

        toggleSpinner(true, "Actualizando estatus de fianza...");

        google.script.run
            .withSuccessHandler(function (res) {
                toggleSpinner(false);
                if (res.success) {
                    Swal.fire({
                        icon: 'success',
                        title: 'Estatus Actualizado',
                        text: `Se ha registrado el No. de Póliza y el Monto para la fianza de ${resIA.tipo}.`,
                        confirmButtonColor: '#059669',
                        customClass: { popup: 'rounded-[2rem]' }
                    });
                    cerrarModalFianza();
                    // Refrescar labels en el detalle
                    if (window.vistaActualParams) inicializarContratoDetalle(window.vistaActualParams);
                } else {
                    manejarError(res);
                }
            })
            .withFailureHandler(function (err) {
                toggleSpinner(false);
                manejarError({ error: err.message, functionName: 'guardarFianzaValidada' });
            })
            .actualizarFianzaDesdeIA(resIA.idContrato, resIA.tipo, resIA.data, resIA.accion);
    };

    /**
     * Fuerza la validación de la fianza omitiendo las discrepancias de la IA.
     */
    window.guardarFianzaForzada = function () {
        const resIA = window.ultimoResultadoFianzaIA;
        if (!resIA) return;

        Swal.fire({
            title: '¿Omitir Discrepancias?',
            text: "Se registrará la fianza como VÁLIDA a pesar de las observaciones detectadas por la IA.",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#059669',
            cancelButtonColor: '#e11d48',
            confirmButtonText: 'Sí, Omitir y Guardar',
            cancelButtonText: 'Cancelar',
            customClass: { popup: 'rounded-[2rem]' }
        }).then((result) => {
            if (result.isConfirmed) {
                toggleSpinner(true, "Forzando validación...");
                google.script.run
                    .withSuccessHandler(function (res) {
                        toggleSpinner(false);
                        if (res.success) {
                            Swal.fire({
                                icon: 'success',
                                title: 'Fianza Forzada con Éxito',
                                text: 'La fianza ha sido marcada como VÁLIDA.',
                                confirmButtonColor: '#059669',
                                customClass: { popup: 'rounded-[2rem]' }
                            });
                            cerrarModalFianza();
                            if (window.vistaActualParams) inicializarContratoDetalle(window.vistaActualParams);
                        } else {
                            manejarError(res);
                        }
                    })
                    .withFailureHandler(function (err) {
                        toggleSpinner(false);
                        manejarError({ error: err.message, functionName: 'guardarFianzaForzada' });
                    })
                    .actualizarFianzaDesdeIA(resIA.idContrato, resIA.tipo, resIA.data, 'forzar');
            }
        });
    };

    window.cerrarModalFianza = function() {
        document.getElementById('modal-fianza-analisis').classList.add('hidden');
        // Resetear visualmente para la próxima vez
        const uploadArea = document.getElementById('fianza-upload-area');
        const resultsArea = document.getElementById('fianza-resultado-ia');
        const btnAplicar = document.getElementById('btn-aplicar-fianza');
        const btnEjecutar = document.getElementById('btn-ejecutar-fianza');

        if(uploadArea) uploadArea.classList.remove('hidden');
        if(resultsArea) resultsArea.classList.add('hidden');
        if(btnAplicar) btnAplicar.classList.add('hidden');
        if(btnEjecutar) btnEjecutar.classList.remove('hidden');
        
        window.ultimoResultadoFianzaIA = null;
    };

</script>
