<div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
    <div>
        <h1 class="text-4xl font-black text-inst-vino uppercase tracking-tighter italic">Listado de Contratos</h1>
        <p class="text-[10px] font-black text-inst-oro uppercase tracking-[0.3em] mt-1">Consulta y seguimiento del
            padrón de contratos de la dependencia</p>
    </div>
    <div class="flex space-x-3">
        <button onclick="abrirImportadorIA()"
            class="bg-white hover:bg-inst-crema/10 text-inst-vino border border-inst-oro/30 font-semibold py-2.5 px-6 rounded-xl shadow-sm transition-all duration-200 flex items-center group">
            <svg class="w-5 h-5 mr-2 text-inst-oro group-hover:scale-110 transition-transform" fill="none"
                stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z">
                </path>
            </svg>
            Importar con IA
        </button>
        <button
            class="bg-inst-vino hover:bg-black text-white font-semibold py-2.5 px-6 rounded-xl shadow-lg shadow-inst-vino/20 transition-all duration-200 flex items-center active:transform active:scale-95">
            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6">
                </path>
            </svg>
            Nuevo Contrato
        </button>
    </div>
</div>

<div class="bg-white rounded-[2.5rem] shadow-xl border border-slate-200 overflow-hidden">
    <div class="bg-rehilete-vino px-10 py-6 border-b-4 border-inst-oro flex items-center justify-between">
        <h2 class="text-xs font-black text-white uppercase tracking-[0.3em] flex items-center">
            <svg class="w-5 h-5 mr-3 text-inst-oro" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                    d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10">
                </path>
            </svg>
            Padrón Oficial de Contratos Vigentes
        </h2>
        <div class="px-4 py-1 bg-white/10 rounded-full border border-white/20">
            <span class="text-[9px] font-black text-white/70 uppercase tracking-widest">SICT GESTIÓN</span>
        </div>
    </div>

    <div class="overflow-x-auto">
        <table class="min-w-full leading-normal" id="tabla-contratos">
            <thead>
                <tr class="bg-slate-50">
                    <th
                        class="px-8 py-5 text-left text-[10px] font-black text-slate-400 uppercase tracking-widest border-b border-slate-100">
                        No. Contrato</th>
                    <th
                        class="px-8 py-5 text-left text-[10px] font-black text-slate-400 uppercase tracking-widest border-b border-slate-100">
                        Objeto del Contrato</th>
                    <th
                        class="px-8 py-5 text-right text-[10px] font-black text-slate-400 uppercase tracking-widest border-b border-slate-100">
                        Monto C/IVA</th>
                    <th
                        class="px-8 py-5 text-center text-[10px] font-black text-slate-400 uppercase tracking-widest border-b border-slate-100">
                        Estado Actual</th>
                </tr>
            </thead>
            <tbody id="contratos-body">
                <tr>
                    <td colspan="4"
                        class="px-6 py-8 border-b border-gray-100 bg-white text-sm text-center text-gray-500">
                        <div class="flex flex-col items-center justify-center space-y-3">
                            <div class="animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-inst-vino"></div>
                            <p class="text-base">Cargando datos del servidor...</p>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
