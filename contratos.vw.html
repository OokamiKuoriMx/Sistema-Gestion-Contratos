<div class="px-8 py-8 md:px-12 md:py-12 space-y-8 animate-in fade-in slide-in-from-bottom-4 duration-700">
    <div class="flex flex-col lg:flex-row justify-between items-start lg:items-center mb-6 gap-4">
        <div>
            <h1 class="text-lg font-black text-inst-vino uppercase tracking-tighter italic">Listado de Contratos</h1>
            <p class="text-base font-black text-inst-oro uppercase tracking-wider mt-2">Consulta y seguimiento del
                padrón de contratos de la dependencia</p>
        </div>
        <div class="flex flex-wrap gap-3">
            <button type="button" onclick="abrirImportadorIA()"
                class="bg-white hover:bg-inst-crema/40 text-inst-vino text-sm md:text-base border border-inst-oro/30 font-semibold py-3 px-5 md:px-7 rounded-2xl shadow-sm transition-all duration-200 flex items-center group focus-ring">
                <svg class="w-6 h-6 mr-2 text-inst-oro group-hover:scale-110 transition-transform" fill="none"
                    stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M13 10V3L4 14h7v7l9-11h-7z">
                    </path>
                </svg>
                Importar con IA
            </button>
            <button type="button" disabled aria-disabled="true" title="Disponible en una siguiente iteración"
                class="bg-slate-200 text-slate-500 text-sm md:text-base font-semibold py-3 px-5 md:px-7 rounded-2xl shadow-sm transition-all duration-200 flex items-center cursor-not-allowed">
                <svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                    xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 6v6m0 0v6m0-6h6m-6 0H6">
                    </path>
                </svg>
                Nuevo Contrato
            </button>
        </div>
    </div>

    <div class="bg-white rounded-[2.5rem] shadow-xl border border-slate-200 overflow-hidden">
        <div class="bg-rehilete-vino px-9 py-5 border-b-4 border-inst-oro flex items-center justify-between">
            <h2 class="text-base font-black text-white uppercase tracking-wider flex items-center">
                <svg class="w-6 h-6 mr-3 text-inst-oro" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                        d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10">
                    </path>
                </svg>
                Padrón Oficial de Contratos Vigentes
            </h2>
            <div class="px-0 py-0 bg-white/10 rounded-full border border-white/20">
                <span class="text-base font-black text-white/70 uppercase tracking-wider">SICT GESTIÓN</span>
            </div>
        </div>

        <div class="overflow-x-auto">
            <table class="min-w-full leading-normal" id="tabla-contratos">
                <thead>
                    <tr class="bg-slate-100/60 border-b border-slate-200">
                        <th
                            class="px-5 md:px-12 py-4 text-left text-[13px] md:text-[15px] font-black text-slate-500 uppercase tracking-widest border-r border-slate-200/50 w-3/12">
                            No. Contrato</th>
                        <th
                            class="px-5 md:px-12 py-4 text-left text-[13px] md:text-[15px] font-black text-slate-500 uppercase tracking-widest border-r border-slate-200/50 w-5/12">
                            Objeto del Contrato</th>
                        <th
                            class="px-5 md:px-12 py-4 text-right text-[13px] md:text-[15px] font-black text-slate-500 uppercase tracking-widest border-r border-slate-200/50 w-2/12">
                            Monto C/IVA</th>
                        <th
                            class="px-5 md:px-12 py-4 text-center text-[13px] md:text-[15px] font-black text-slate-500 uppercase tracking-widest w-2/12">
                            Estado Actual</th>
                    </tr>
                </thead>
                <tbody id="contratos-body">
                    <tr>
                        <td colspan="4"
                            class="px-5 py-7 border-b border-gray-100 bg-white text-base text-center text-gray-500">
                            <div class="flex flex-col items-center justify-center space-y-3">
                                <div class="animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-inst-vino">
                                </div>
                                <p class="text-base">Cargando datos del servidor...</p>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
