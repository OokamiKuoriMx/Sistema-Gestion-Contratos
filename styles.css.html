<style>
    /* 
   * Estilos específicos que Tailwind no cubre o sobrescrituras necesarias.
   * Identidad Institucional:
   * 161a1d, 9b2247, 1e5b4f, a57f2c, 98989a, 611232, 002f2a, e6d194
   */

    :root {
        --inst-negro: #161a1d;
        --inst-guinda: #9b2247;
        --inst-verde: #1e5b4f;
        --inst-oro: #a57f2c;
        --inst-oro-light: #e6d194;
        --inst-gris: #98989a;
        --inst-vino: #611232;
        --inst-vino-dark: #4a0e26;
        --inst-petroleo: #002f2a;
        --inst-crema: #f4efdf;
    }

    /* Asegurar que el spinner global bloquea toda interacción cuando está visible y usa animaciones suaves */
    #global-spinner {
        transition: opacity 0.3s ease-in-out;
    }

    #global-spinner:not(.hidden) {
        pointer-events: all;
        /* Activa la captura de clicks sobre su z-index altísimo */
        opacity: 1;
        display: flex;
        /* Mantiene override visual en tailwind classes */
    }

    /* Executive Sidebar Styles */
    #sidebar {
        transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
    }

    #sidebar.collapsed {
        width: 80px;
    }

    #sidebar.collapsed .sidebar-text {
        opacity: 0;
        pointer-events: none;
        width: 0;
    }

    #sidebar.collapsed .sidebar-header-text {
        display: none;
    }

    .nav-link {
        transition: all 0.2s ease;
        position: relative;
    }

    .nav-link:hover {
        background: rgba(255, 255, 255, 0.1);

    }

        transition: opacity 0.2s ease;
        white-space: nowrap;
    }

    .glass-effect {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
    }

    /* Drop Zone Styles */
    .drop-zone {
        border: 2px dashed #e2e8f0;
        transition: all 0.3s ease;
        background: #f8fafc;
    }

    .drop-zone.drag-over {
        border-color: #3b82f6;
        background: #eff6ff;
        transform: scale(1.02);
    }

    .drop-zone-icon {
        transition: transform 0.3s ease;
    }

    .drop-zone.drag-over .drop-zone-icon {
        transform: translateY(-10px);
        color: #3b82f6;
    }

    /* Custom Scrollbar aesthetic redesign */
    ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
